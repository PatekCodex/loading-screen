<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>House of Crazy People – TTT</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --pink:   #ff2d78;
  --purple: #b400ff;
  --cyan:   #00f5ff;
  --yellow: #ffe600;
  --green:  #00ff88;
  --bg:     #07000d;
  --bg2:    #0d0018;
  --dim:    #4a2060;
  --text:   #d8a0f8;
}
html, body { width: 100%; height: 100%; overflow: hidden; }
body {
  background: #07000d;
  color: var(--text);
  font-family: 'Press Start 2P', monospace;
  display: flex;
  flex-direction: column;
}

/* Canvas fills the whole screen behind everything */
#bgCanvas {
  position: fixed;
  inset: 0;
  z-index: 0;
  width: 100%;
  height: 100%;
}

/* HTML sun label – reliable font rendering */
#sunLabel {
  position: fixed;
  left: 50%;
  transform: translateX(-50%);
  top: 12%;
  z-index: 10;
  text-align: center;
  pointer-events: none;
  animation: labelFlicker 8s ease-in-out infinite;
}
@keyframes labelFlicker {
  0%,88%,100%{opacity:1;} 90%{opacity:0.3;} 92%{opacity:1;} 95%{opacity:0.5;} 97%{opacity:1;}
}
#sunLabel .top {
  display: block;
  font-size: 1.1rem;
  letter-spacing: 0.18em;
  color: #00f5ff;
  text-shadow: 0 0 24px #00f5ff, 0 0 50px rgba(0,245,255,0.6);
  margin-bottom: 10px;
}
#sunLabel .bot {
  display: block;
  font-size: 2.2rem;
  letter-spacing: 0.1em;
  color: #ffe600;
  text-shadow: 0 0 30px #ffe600, 0 0 60px rgba(255,230,0,0.7), 4px 4px 0 rgba(180,0,255,0.7);
  white-space: nowrap;
}

.scanlines {
  position: fixed; inset: 0; z-index: 100; pointer-events: none;
  background: repeating-linear-gradient(to bottom, transparent 0, transparent 2px, rgba(0,0,0,0.12) 2px, rgba(0,0,0,0.12) 4px);
}

.topbar {
  position: relative; z-index: 200;
  display: flex; align-items: center; justify-content: space-between;
  height: 54px;
  padding: 0 20px;
  background: rgba(7,0,13,0.96);
  border-bottom: 2px solid var(--purple);
  box-shadow: 0 0 24px rgba(180,0,255,0.4), 0 3px 0 var(--pink);
  flex-shrink: 0;
}
.tb-left { display: flex; align-items: center; gap: 12px; }
.tb-logo { width: 36px; height: 36px; object-fit: cover; border: 2px solid var(--pink); box-shadow: 0 0 10px var(--pink); }
.tb-name { font-size: 0.65rem; color: var(--cyan); text-shadow: 0 0 12px var(--cyan), 2px 2px 0 rgba(180,0,255,0.5); letter-spacing: 0.06em; }
.tb-status {
  font-family: 'VT323', monospace; font-size: 1rem;
  color: var(--pink); text-shadow: 0 0 10px var(--pink);
  display: flex; align-items: center; gap: 6px;
  animation: blink 1.2s step-end infinite;
}
.tb-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--pink); box-shadow: 0 0 8px var(--pink); }
@keyframes blink { 50%{opacity:0.25;} }

.loader {
  position: relative; z-index: 200;
  flex-shrink: 0;
  background: rgba(7,0,13,0.98);
  border-bottom: 2px solid rgba(180,0,255,0.4);
  padding: 6px 20px 8px;
  box-shadow: 0 4px 20px rgba(255,45,120,0.2);
}
.loader-top {
  display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px;
}
.loader-msg { font-size: 0.35rem; letter-spacing: 0.12em; color: var(--cyan); text-shadow: 0 0 8px var(--cyan); }
.loader-pct { font-family: 'VT323', monospace; font-size: 1.3rem; color: var(--pink); text-shadow: 0 0 12px var(--pink); }
.loader-track {
  width: 100%; height: 10px;
  background: rgba(180,0,255,0.1);
  border: 1px solid rgba(180,0,255,0.4);
  border-radius: 1px;
  overflow: hidden;
  position: relative;
}
.loader-bar {
  height: 100%; width: 0%;
  background: repeating-linear-gradient(90deg, var(--pink) 0, var(--pink) 8px, var(--purple) 8px, var(--purple) 16px);
  box-shadow: 0 0 16px var(--pink);
  transition: width 0.3s ease;
  position: relative;
}
.loader-bar::after {
  content: ''; position: absolute; right: 0; top: 0; bottom: 0; width: 3px;
  background: #fff; box-shadow: 0 0 8px #fff;
  animation: cur 0.5s step-end infinite;
}
@keyframes cur { 50%{opacity:0;} }

.main {
  flex: 1;
  display: grid;
  grid-template-columns: 1fr 270px;
  position: relative; z-index: 150;
  overflow: hidden;
  min-height: 0;
}
.left { position: relative; display: flex; flex-direction: column; justify-content: flex-end; }

.info-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  padding: 10px 16px;
  background: rgba(7,0,13,0.88);
  border-top: 1px solid rgba(180,0,255,0.25);
  backdrop-filter: blur(4px);
}
.info-box {
  background: rgba(180,0,255,0.05);
  border: 1px solid rgba(180,0,255,0.35);
  padding: 8px 10px;
  position: relative; overflow: hidden;
}
.info-box::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--purple), transparent);
}
.info-val {
  font-family: 'VT323', monospace; font-size: 1.3rem;
  color: var(--pink); text-shadow: 0 0 10px var(--pink); line-height: 1;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.info-key { font-size: 0.28rem; letter-spacing: 0.15em; color: var(--dim); text-transform: uppercase; margin-top: 3px; }

.tip-area {
  padding: 8px 16px;
  background: rgba(7,0,13,0.82);
  border-top: 1px solid rgba(180,0,255,0.15);
}
.tip-lbl { font-size: 0.32rem; letter-spacing: 0.15em; color: var(--cyan); margin-bottom: 4px; }
.tip-txt {
  font-family: 'VT323', monospace; font-size: 0.9rem;
  color: rgba(220,170,255,0.85); line-height: 1.4;
  transition: opacity 0.4s;
}
.tip-txt span { color: var(--yellow); }

.right {
  border-left: 2px solid rgba(180,0,255,0.5);
  box-shadow: -8px 0 30px rgba(180,0,255,0.15);
  background: rgba(7,0,13,0.92);
  display: flex; flex-direction: column;
  overflow: hidden;
  backdrop-filter: blur(4px);
}
.panel-hdr {
  font-size: 0.36rem; letter-spacing: 0.18em; color: var(--cyan);
  text-shadow: 0 0 8px var(--cyan);
  padding: 8px 14px 5px;
  display: flex; align-items: center; gap: 5px;
  flex-shrink: 0;
  border-bottom: 1px solid rgba(180,0,255,0.15);
}
.panel-hdr::before { content: '▶'; font-size: 0.38rem; color: var(--pink); }

.music-block { padding: 8px 14px 10px; flex-shrink: 0; }
.now-track {
  font-family: 'VT323', monospace; font-size: 1rem;
  color: var(--yellow); text-shadow: 0 0 10px var(--yellow);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px;
}
.now-artist { font-family: 'VT323', monospace; font-size: 0.78rem; color: var(--dim); margin-bottom: 8px; }
.mus-prog { height: 3px; background: rgba(180,0,255,0.2); border: 1px solid rgba(180,0,255,0.3); cursor: pointer; margin-bottom: 3px; }
.mus-prog-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--purple), var(--pink)); box-shadow: 0 0 6px var(--pink); transition: width 1s linear; }
.mus-time { display: flex; justify-content: space-between; font-family: 'VT323', monospace; font-size: 0.62rem; color: var(--dim); }

.vis-block { padding: 4px 14px 8px; flex-shrink: 0; }
.vis-bars {
  display: flex; align-items: flex-end; gap: 2px;
  height: 55px;
  background: rgba(0,0,0,0.4);
  border: 1px solid rgba(180,0,255,0.2);
  border-radius: 1px;
  padding: 3px; overflow: hidden;
}
.vbar {
  flex: 1; min-height: 2px; border-radius: 1px 1px 0 0;
  background: linear-gradient(to top, var(--purple), var(--pink), #fff);
  box-shadow: 0 0 4px var(--pink);
  transition: height 0.08s ease;
}

.team-block { flex: 1; display: flex; flex-direction: column; min-height: 0; }

.team-scroll { flex: 1; overflow-y: auto; padding: 4px 0; }
.team-scroll::-webkit-scrollbar { width: 3px; }
.team-scroll::-webkit-scrollbar-thumb { background: var(--purple); }

.tm-row {
  display: flex; align-items: center; gap: 9px;
  padding: 6px 10px;
  border-bottom: 1px solid rgba(180,0,255,0.08);
  position: relative;
}
.tm-row:hover { background: rgba(180,0,255,0.05); }

.tm-avatar {
  width: 36px; height: 36px; border-radius: 2px; flex-shrink: 0;
  border: 1px solid rgba(180,0,255,0.5);
  background: rgba(180,0,255,0.15);
  display: flex; align-items: center; justify-content: center;
  overflow: hidden; position: relative;
}
.tm-avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
.tm-avatar-init {
  font-family: 'VT323', monospace; font-size: 1.3rem; line-height: 1;
}
.tm-online-dot {
  position: absolute; bottom: -2px; right: -2px;
  width: 8px; height: 8px; border-radius: 50%;
  border: 1px solid #07000d;
}

.tm-info { flex: 1; min-width: 0; }
.tm-name {
  font-family: 'VT323', monospace; font-size: 1rem;
  color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  line-height: 1.2;
}
.tm-name.loading { color: var(--dim); font-size: 0.8rem; }
.tm-rank {
  font-size: 0.2rem; letter-spacing: 0.14em; text-transform: uppercase;
  padding: 1px 5px 1px 4px; border-radius: 1px; margin-top: 3px; display: inline-block;
}
.tm-sid { font-family: 'VT323', monospace; font-size: 0.6rem; color: var(--dim); margin-top: 1px; }

.tm-del {
  font-family: 'VT323', monospace; font-size: 1rem;
  color: transparent; cursor: pointer; padding: 2px 4px; flex-shrink: 0;
  transition: color 0.15s;
}
.tm-row:hover .tm-del { color: var(--dim); }
.tm-del:hover { color: var(--pink) !important; text-shadow: 0 0 6px var(--pink); }

/* Add form */
.team-add-btn {
  margin: 5px 10px 4px;
  padding: 6px; font-family: 'Press Start 2P', monospace;
  font-size: 0.28rem; letter-spacing: 0.1em; color: var(--cyan);
  background: rgba(0,245,255,0.05); border: 1px solid rgba(0,245,255,0.25);
  cursor: pointer; text-align: center; flex-shrink: 0;
  transition: background 0.2s, border-color 0.2s;
}
.team-add-btn:hover { background: rgba(0,245,255,0.12); border-color: var(--cyan); }

.team-form {
  padding: 8px 10px; flex-shrink: 0;
  background: rgba(0,0,0,0.4);
  border-top: 1px solid rgba(180,0,255,0.2);
  display: none; flex-direction: column; gap: 4px;
}
.team-form.open { display: flex; }
.tf-row { display: flex; gap: 5px; align-items: flex-end; }
.tf-lbl { font-size: 0.22rem; letter-spacing: 0.1em; color: var(--dim); margin-bottom: 1px; margin-top: 2px; }
.tf-inp {
  flex: 1; background: rgba(0,0,0,0.6); border: 1px solid rgba(180,0,255,0.3);
  color: var(--text); font-family: 'VT323', monospace; font-size: 0.9rem;
  padding: 3px 7px; min-width: 0; outline: none;
}
.tf-inp:focus { border-color: var(--cyan); box-shadow: 0 0 5px rgba(0,245,255,0.25); }
.tf-inp::placeholder { color: var(--dim); }
.tf-sel {
  background: rgba(0,0,0,0.6); border: 1px solid rgba(180,0,255,0.3);
  color: var(--text); font-family: 'VT323', monospace; font-size: 0.9rem;
  padding: 3px 5px; outline: none; flex-shrink: 0;
}
.tf-hint { font-family: 'VT323', monospace; font-size: 0.65rem; color: var(--dim); margin-top: 1px; }
.tf-btns { display: flex; gap: 5px; margin-top: 3px; }
.tf-save {
  flex: 1; padding: 5px; font-family: 'Press Start 2P', monospace;
  font-size: 0.25rem; letter-spacing: 0.08em;
  background: rgba(255,45,120,0.12); border: 1px solid var(--pink);
  color: var(--pink); cursor: pointer; transition: background 0.2s;
}
.tf-save:hover { background: rgba(255,45,120,0.28); }
.tf-cancel {
  padding: 5px 8px; font-family: 'Press Start 2P', monospace;
  font-size: 0.25rem; background: transparent;
  border: 1px solid rgba(180,0,255,0.3); color: var(--dim); cursor: pointer;
}
.tf-cancel:hover { border-color: var(--purple); color: var(--text); }
.p-empty { padding: 12px 14px; font-family: 'VT323', monospace; font-size: 0.8rem; color: var(--dim); line-height: 2; }

</style>
</head>
<body>

<!-- CANVAS BACKGROUND -->
<canvas id="bgCanvas"></canvas>

<!-- SUN LABEL as HTML so fonts render reliably -->
<div id="sunLabel">
  <span class="top">HOUSE OF</span>
  <span class="bot">CRAZY PEOPLE</span>
</div>

<div class="scanlines"></div>

<div class="topbar">
  <div class="tb-left">
    <img class="tb-logo" src="p.png" alt="">
    <span class="tb-name">HOUSE OF CRAZY PEOPLE</span>
  </div>
  <div class="tb-status">
    <div class="tb-dot"></div>
    <span id="statusTxt">CONNECTING...</span>
  </div>
</div>

<div class="loader">
  <div class="loader-top">
    <div class="loader-msg" id="loadMsg">VERBINDE MIT SERVER...</div>
    <div class="loader-pct" id="pctTxt">0%</div>
  </div>
  <div class="loader-track">
    <div class="loader-bar" id="pbar"></div>
  </div>
</div>

<div class="main">
  <div class="left">
    <div class="tip-area">
      <div class="tip-lbl">▶ TIPP</div>
      <div class="tip-txt" id="tipTxt"><span>Lade Tipps...</span></div>
    </div>
    <div class="info-row">
      <div class="info-box">
        <div class="info-val" id="playerCount">--/32</div>
        <div class="info-key">Spieler</div>
      </div>
      <div class="info-box">
        <div class="info-val" id="mapDisp" style="font-size:0.85rem;">--</div>
        <div class="info-key">Map</div>
      </div>
      <div class="info-box">
        <div class="info-val">TTT</div>
        <div class="info-key">Modus</div>
      </div>
      <div class="info-box">
        <div class="info-val" id="pingDisp">--</div>
        <div class="info-key">Ping ms</div>
      </div>
    </div>
  </div>

  <div class="right">
    <div class="panel-hdr">NOW PLAYING</div>
    <div class="music-block">
      <div class="now-track" id="trackName">Lade Musik...</div>
      <div class="now-artist" id="trackArtist">--</div>
      <div class="mus-prog" id="musTrack">
        <div class="mus-prog-fill" id="musFill"></div>
      </div>
      <div class="mus-time">
        <span id="tNow">0:00</span>
        <span id="tTot">0:00</span>
      </div>
    </div>
    <div class="panel-hdr">VISUALISER</div>
    <div class="vis-block">
      <div class="vis-bars" id="visBars"></div>
    </div>

    <div class="panel-hdr">TEAM</div>
    <div class="team-block">
      <div class="team-scroll" id="teamList"></div>
      <button class="team-add-btn" onclick="toggleTeamForm()">+ MITGLIED HINZUFÜGEN</button>
      <div class="team-form" id="teamForm">
        <div class="tf-lbl">STEAM ID</div>
        <input class="tf-inp" id="tf-sid" placeholder="STEAM_0:1:XXXXXXXX oder 7656119…" maxlength="25">
        <div class="tf-hint">Name &amp; Avatar werden automatisch geladen</div>
        <div class="tf-lbl">RANG</div>
        <div class="tf-row">
          <input class="tf-inp" id="tf-rank" placeholder="z.B. Server-Owner" maxlength="20">
          <select class="tf-sel" id="tf-color">
            <option value="#ff2d78">Pink</option>
            <option value="#ffe600">Gold</option>
            <option value="#00f5ff">Cyan</option>
            <option value="#00ff88">Grün</option>
            <option value="#b400ff">Lila</option>
            <option value="#ff8c00">Orange</option>
            <option value="#ffffff">Weiß</option>
          </select>
        </div>
        <div class="tf-btns">
          <button class="tf-save" onclick="saveTeamMember()">SPEICHERN</button>
          <button class="tf-cancel" onclick="toggleTeamForm()">ABBRUCH</button>
        </div>
      </div>
    </div>
  </div>
</div>

<audio id="aud" preload="auto"></audio>

<script>
// ═══════════════════════════════════════════════
//  CANVAS BACKGROUND RENDERER
// ═══════════════════════════════════════════════
var canvas = document.getElementById('bgCanvas');
var ctx = canvas.getContext('2d');
var W, H;
var tick = 0;

// Stars data
var stars = [];
function initStars() {
  stars = [];
  for (var i = 0; i < 120; i++) {
    stars.push({
      x: Math.random() * W,
      y: Math.random() * H * 0.65,
      r: Math.random() * 1.5 + 0.3,
      phase: Math.random() * Math.PI * 2,
      speed: 0.5 + Math.random() * 1.5
    });
  }
}

// Shooting stars
var shooters = [];
function spawnShooter() {
  if (Math.random() < 0.008) {
    shooters.push({
      x: Math.random() * W * 0.8,
      y: Math.random() * H * 0.3,
      len: 80 + Math.random() * 120,
      alpha: 1,
      speed: 6 + Math.random() * 6
    });
  }
}

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  initStars();
}
window.addEventListener('resize', resize);
resize();

// Horizon Y (where ocean meets mountains)
function horizY() { return H * 0.68; }

function drawSky() {
  var hy = horizY();
  var grad = ctx.createLinearGradient(0, 0, 0, hy);
  grad.addColorStop(0,    '#04000a');
  grad.addColorStop(0.3,  '#0c0018');
  grad.addColorStop(0.6,  '#160028');
  grad.addColorStop(0.85, '#200038');
  grad.addColorStop(1,    '#140025');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, hy);
}

function drawStars() {
  for (var i = 0; i < stars.length; i++) {
    var s = stars[i];
    var alpha = 0.3 + 0.7 * (0.5 + 0.5 * Math.sin(s.phase + tick * s.speed * 0.01));
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,' + alpha + ')';
    ctx.fill();
  }
}

function drawShooters() {
  for (var i = shooters.length - 1; i >= 0; i--) {
    var sh = shooters[i];
    var grd = ctx.createLinearGradient(sh.x, sh.y, sh.x + sh.len, sh.y + sh.len * 0.4);
    grd.addColorStop(0, 'rgba(255,255,255,0)');
    grd.addColorStop(1, 'rgba(255,255,255,' + sh.alpha + ')');
    ctx.beginPath();
    ctx.moveTo(sh.x, sh.y);
    ctx.lineTo(sh.x + sh.len, sh.y + sh.len * 0.4);
    ctx.strokeStyle = grd;
    ctx.lineWidth = 1.5;
    ctx.stroke();
    sh.x += sh.speed * 2;
    sh.y += sh.speed * 0.8;
    sh.alpha -= 0.025;
    if (sh.alpha <= 0) shooters.splice(i, 1);
  }
}

function drawSun() {
  var cx = W / 2;
  var hy = horizY();
  // Large sun radius
  var sunR = H * 0.16;
  // Sun CENTER fixed at 42% from top – clearly above all mountains (which peak at ~0.55*hy = ~37% from top)
  var sunCY = H * 0.42;

  // Position the HTML label just above the sun
  var labelEl = document.getElementById('sunLabel');
  if (labelEl) {
    labelEl.style.top = (sunCY - sunR - 16) + 'px';
  }

  // Outer glow pulse
  var glowPulse = 0.8 + 0.2 * Math.sin(tick * 0.02);
  var glow = ctx.createRadialGradient(cx, sunCY, sunR * 0.5, cx, sunCY, sunR * 3.5);
  glow.addColorStop(0,   'rgba(255,45,120,' + (0.5 * glowPulse) + ')');
  glow.addColorStop(0.3, 'rgba(180,0,255,'  + (0.3 * glowPulse) + ')');
  glow.addColorStop(0.7, 'rgba(180,0,255,0.05)');
  glow.addColorStop(1,   'rgba(180,0,255,0)');
  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.arc(cx, sunCY, sunR * 3.5, 0, Math.PI * 2);
  ctx.fill();

  // Sun body – clip to circle
  ctx.save();
  ctx.beginPath();
  ctx.arc(cx, sunCY, sunR, 0, Math.PI * 2);
  ctx.clip();

  // Color gradient
  var sunGrad = ctx.createLinearGradient(cx, sunCY - sunR, cx, sunCY + sunR);
  sunGrad.addColorStop(0,    '#fff9c0');
  sunGrad.addColorStop(0.12, '#ffe600');
  sunGrad.addColorStop(0.32, '#ff8c00');
  sunGrad.addColorStop(0.58, '#ff2d78');
  sunGrad.addColorStop(0.80, '#cc00dd');
  sunGrad.addColorStop(1,    '#7700bb');
  ctx.fillStyle = sunGrad;
  ctx.fillRect(cx - sunR, sunCY - sunR, sunR * 2, sunR * 2);

  // Horizontal stripe lines in lower half
  ctx.fillStyle = '#07000d';
  var pos = sunCY + sunR * 0.05;
  var lineThick = sunR / 18;
  var gaps2 = [1.8, 2.5, 1.2, 2.8, 1.0, 2.2, 1.4, 2.0, 0.8, 1.8, 1.2, 1.6, 0.8, 1.5, 0.9, 1.4, 0.7, 1.3, 0.7, 1.2, 0.6, 1.1];
  for (var li = 0; li < gaps2.length; li++) {
    pos += gaps2[li] * lineThick;
    if (pos > sunCY + sunR) break;
    ctx.fillRect(cx - sunR, pos, sunR * 2, lineThick * 0.6);
    pos += lineThick * 0.6;
  }
  ctx.restore();
}

function drawSunReflection() {
  var cx = W / 2;
  var hy = horizY();
  var grad = ctx.createLinearGradient(cx, hy, cx, H);
  grad.addColorStop(0,   'rgba(255,45,120,0.35)');
  grad.addColorStop(0.4, 'rgba(255,45,120,0.12)');
  grad.addColorStop(1,   'rgba(255,45,120,0)');
  var rw = 4 + 6 * (0.5 + 0.5 * Math.sin(tick * 0.03));
  ctx.fillStyle = grad;
  ctx.fillRect(cx - rw / 2, hy, rw, H - hy);
}

function drawMountains() {
  var hy = horizY();

  // Back mountains
  ctx.beginPath();
  ctx.moveTo(0, H);
  ctx.lineTo(0, hy * 0.88);
  var bpts = [
    0.03,0.82, 0.07,0.92, 0.11,0.74, 0.15,0.88, 0.20,0.66,
    0.25,0.85, 0.29,0.72, 0.34,0.88, 0.39,0.62,
    0.44,0.82, 0.48,0.70, 0.53,0.90, 0.57,0.65,
    0.62,0.84, 0.66,0.72, 0.71,0.90, 0.76,0.62,
    0.81,0.85, 0.85,0.70, 0.89,0.88, 0.93,0.65,
    0.97,0.85, 1.0,0.75
  ];
  for (var i = 0; i < bpts.length; i += 2) {
    ctx.lineTo(bpts[i] * W, bpts[i+1] * hy);
  }
  ctx.lineTo(W, H);
  ctx.closePath();
  ctx.fillStyle = '#0e001e';
  ctx.fill();

  // Back mountain edge glow
  ctx.beginPath();
  ctx.moveTo(0, hy * 0.88);
  for (var j = 0; j < bpts.length; j += 2) {
    ctx.lineTo(bpts[j] * W, bpts[j+1] * hy);
  }
  ctx.strokeStyle = 'rgba(180,0,255,0.8)';
  ctx.lineWidth = 1.5;
  ctx.shadowColor = '#b400ff';
  ctx.shadowBlur = 10;
  ctx.stroke();
  ctx.shadowBlur = 0;

  // Front mountains
  ctx.beginPath();
  ctx.moveTo(0, H);
  ctx.lineTo(0, hy * 0.96);
  var fpts = [
    0.04,0.86, 0.08,0.95, 0.13,0.75, 0.18,0.90, 0.23,0.68,
    0.28,0.88, 0.33,0.75, 0.38,0.92, 0.43,0.65,
    0.48,0.85, 0.52,0.95, 0.57,0.72, 0.62,0.90,
    0.67,0.78, 0.72,0.92, 0.77,0.65, 0.82,0.88,
    0.87,0.75, 0.91,0.90, 0.95,0.78, 1.0,0.88
  ];
  for (var k = 0; k < fpts.length; k += 2) {
    ctx.lineTo(fpts[k] * W, fpts[k+1] * hy);
  }
  ctx.lineTo(W, H);
  ctx.closePath();
  ctx.fillStyle = '#09000f';
  ctx.fill();

  // Front mountain edge glow
  ctx.beginPath();
  ctx.moveTo(0, hy * 0.96);
  for (var m = 0; m < fpts.length; m += 2) {
    ctx.lineTo(fpts[m] * W, fpts[m+1] * hy);
  }
  ctx.strokeStyle = 'rgba(255,45,120,0.9)';
  ctx.lineWidth = 2;
  ctx.shadowColor = '#ff2d78';
  ctx.shadowBlur = 12;
  ctx.stroke();
  ctx.shadowBlur = 0;
}

function drawTrees() {
  var hy = horizY();
  var groundY = hy; // trees sit at horizon

  function drawTree(x, scale, flip) {
    ctx.save();
    ctx.translate(x, groundY);
    if (flip) ctx.scale(-1, 1);
    ctx.scale(scale, scale);

    var col = 'rgba(180,0,255,0.55)';
    ctx.strokeStyle = col;
    ctx.lineWidth = 2.5 / scale;
    ctx.shadowColor = '#b400ff';
    ctx.shadowBlur = 8;

    // Trunk
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(0, -90);
    ctx.stroke();

    // Branches
    var branches = [
      [-10, -30, -55, -65, 1.0],
      [-10, -30, -75, -80, 0.7],
      [8,  -45, 50,  -72, 0.9],
      [-5, -55, -40, -85, 0.8],
      [5,  -65, 35,  -90, 0.7],
      [-3, -72, -28, -92, 0.6],
      [3,  -80, 20,  -95, 0.5],
    ];
    for (var bi = 0; bi < branches.length; bi++) {
      var b = branches[bi];
      ctx.globalAlpha = b[4];
      ctx.beginPath();
      ctx.moveTo(b[0], b[1]);
      ctx.lineTo(b[2], b[3]);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
    ctx.shadowBlur = 0;
    ctx.restore();
  }

  // Left cluster
  drawTree(W * 0.05, 1.1, false);
  drawTree(W * 0.11, 0.8, false);
  drawTree(W * 0.15, 1.3, true);

  // Right cluster
  drawTree(W * 0.88, 1.0, true);
  drawTree(W * 0.93, 1.2, false);
}

function drawOcean() {
  var hy = horizY();

  // Ocean base
  var og = ctx.createLinearGradient(0, hy, 0, H);
  og.addColorStop(0,   '#1a0035');
  og.addColorStop(0.3, '#100020');
  og.addColorStop(1,   '#07000d');
  ctx.fillStyle = og;
  ctx.fillRect(0, hy, W, H - hy);

  // Horizon glow line
  ctx.beginPath();
  ctx.moveTo(0, hy);
  ctx.lineTo(W, hy);
  ctx.strokeStyle = 'rgba(255,45,120,0.9)';
  ctx.lineWidth = 2;
  ctx.shadowColor = '#ff2d78';
  ctx.shadowBlur = 20;
  ctx.stroke();
  ctx.shadowBlur = 0;

  // Grid lines (perspective)
  var numH = 10;
  for (var hi = 0; hi < numH; hi++) {
    var t = Math.pow((hi + 1) / numH, 1.6);
    var y = hy + (H - hy) * t;
    var alpha = 0.35 * (1 - t * 0.7);
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(W, y);
    ctx.strokeStyle = 'rgba(180,0,255,' + alpha + ')';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // Vertical grid lines (vanishing point)
  var numV = 14;
  var vp = { x: W / 2, y: hy };
  for (var vi = 0; vi < numV; vi++) {
    var bx = (vi / (numV - 1)) * W;
    var alpha2 = 0.2 + 0.1 * Math.abs(vi - numV / 2) / (numV / 2);
    ctx.beginPath();
    ctx.moveTo(vp.x, vp.y);
    ctx.lineTo(bx, H);
    ctx.strokeStyle = 'rgba(180,0,255,' + alpha2 + ')';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // Animated waves
  var waveColors = [
    'rgba(255,45,120,',
    'rgba(180,0,255,',
    'rgba(0,245,255,',
    'rgba(255,45,120,',
    'rgba(180,0,255,',
  ];
  for (var wi = 0; wi < 5; wi++) {
    var wy = hy + (H - hy) * (0.08 + wi * 0.18);
    var wAlpha = 0.5 - wi * 0.07;
    var offset = Math.sin(tick * 0.012 + wi * 1.3) * 15;
    ctx.beginPath();
    ctx.moveTo(-20 + offset, wy);
    for (var wx = 0; wx <= W + 20; wx += 40) {
      var wh = 2 + Math.sin((wx / W) * Math.PI * 6 + tick * 0.015 + wi) * 2;
      ctx.lineTo(wx + offset, wy + wh);
    }
    ctx.strokeStyle = waveColors[wi % waveColors.length] + wAlpha + ')';
    ctx.lineWidth = wi < 2 ? 2 : 1;
    ctx.shadowColor = wi < 2 ? '#ff2d78' : '#b400ff';
    ctx.shadowBlur = wi < 2 ? 8 : 4;
    ctx.stroke();
    ctx.shadowBlur = 0;
  }

  // Shimmer on reflection column
  var cx = W / 2;
  var shimW = 2 + 6 * (0.5 + 0.5 * Math.sin(tick * 0.04));
  var shimGrad = ctx.createLinearGradient(cx, hy, cx, H);
  shimGrad.addColorStop(0,   'rgba(255,45,120,0.4)');
  shimGrad.addColorStop(0.5, 'rgba(255,45,120,0.15)');
  shimGrad.addColorStop(1,   'rgba(255,45,120,0)');
  ctx.fillStyle = shimGrad;
  ctx.fillRect(cx - shimW / 2, hy, shimW, H - hy);
}

function render() {
  tick++;
  spawnShooter();
  ctx.clearRect(0, 0, W, H);
  drawSky();
  drawStars();
  drawShooters();
  drawSunReflection();
  drawSun();
  drawMountains();
  drawTrees();
  drawOcean();
  requestAnimationFrame(render);
}

function steamToSteam64(sid) {
  sid = (sid || '').trim();
  if (/^\d{17}$/.test(sid)) return sid;
  var m = sid.match(/^STEAM_\d+:(\d):(\d+)$/i);
  if (m) {
    try {
      return String(BigInt('76561197960265728') + BigInt(parseInt(m[2])) * BigInt(2) + BigInt(parseInt(m[1])));
    } catch(e) {
      return String(76561197960265728 + parseInt(m[2]) * 2 + parseInt(m[1]));
    }
  }
  return null;
}

function fetchSteamProfile(steam64, callback) {
  var url = 'https://steamcommunity.com/profiles/' + steam64 + '/?xml=1';
  var proxy = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(url);
  var xhr = new XMLHttpRequest();
  xhr.open('GET', proxy, true);
  xhr.timeout = 10000;
  xhr.onreadystatechange = function() {
    if (xhr.readyState !== 4) return;
    if (xhr.status === 200 && xhr.responseText) {
      try {
        var xml = xhr.responseText;
        var nm = xml.match(/<steamID><!\[CDATA\[([^\]]+)\]\]><\/steamID>/i);
        var av = xml.match(/<avatarMedium><!\[CDATA\[([^\]]+)\]\]><\/avatarMedium>/i);
        callback(nm ? nm[1] : null, av ? av[1] : null);
      } catch(e) { callback(null, null); }
    } else { callback(null, null); }
  };
  xhr.onerror = xhr.ontimeout = function(){ callback(null, null); };
  xhr.send();
}

  curTrk = idx;
  document.getElementById('trackName').textContent = t.name || 'Unbekannt';
  document.getElementById('trackArtist').textContent = t.artist || '--';
  aud.volume = (t.vol !== undefined) ? t.vol : 0.20;
  if (t.file) {
    aud.src = t.file;
    aud.load();
    aud.onerror = function() { document.getElementById('trackArtist').textContent = 'FEHLER: ' + t.file; };
  }
}
function tryPlay() {
  if (isPlaying) return;
  var vol = playlist[curTrk] ? (playlist[curTrk].vol || 0.20) : 0.20;
  aud.volume = vol;
  aud.play().then(function(){
    isPlaying = true; aud.volume = vol;
  }).catch(function(){
    setTimeout(function(){ aud.play().then(function(){ isPlaying = true; }).catch(function(){}); }, 1000);
  });
}
aud.addEventListener('volumechange', function(){
  var target = playlist[curTrk] ? (playlist[curTrk].vol || 0.20) : 0.20;
  if (aud.volume > target + 0.01) aud.volume = target;
});
aud.addEventListener('ended', function(){
  var next = (curTrk + 1) % playlist.length;
  loadTrk(next);
  setTimeout(function(){ aud.play().catch(function(){}); }, 100);
});
setInterval(function(){
  if (!aud.duration) return;
  var pct = (aud.currentTime / aud.duration) * 100;
  document.getElementById('musFill').style.width = pct + '%';
  document.getElementById('tNow').textContent = fmt(aud.currentTime);
  document.getElementById('tTot').textContent = fmt(aud.duration);
}, 500);
function fmt(s) { var m = Math.floor(s / 60); return m + ':' + ('0' + Math.floor(s % 60)).slice(-2); }
</script>
</body>
</html>
