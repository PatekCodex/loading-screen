<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>House of Crazy People – TTT</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --pink:   #ff2d78;
  --purple: #b400ff;
  --cyan:   #00f5ff;
  --yellow: #ffe600;
  --green:  #00ff88;
  --bg:     #0a0010;
  --bg2:    #110019;
  --grid:   #180028;
  --text:   #f0c0ff;
  --dim:    #6a3a8a;
  --gmod:   56px;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Press Start 2P', monospace;
  height: 100vh;
  overflow: hidden;
  display: grid;
  grid-template-rows: 58px 1fr auto;
}

/* ── ANIMATED BG ── */
.bg-wrap {
  position: fixed; inset: 0; z-index: 0; overflow: hidden;
}
/* Ocean Canvas */
#oceanCanvas {
  position: absolute;
  inset: 0;
  width: 100%; height: 100%;
  z-index: 0;
}
/* Stars */
.bg-stars {
  position: absolute; inset: 0;
}
.star {
  position: absolute; background: #fff;
  width: 2px; height: 2px; border-radius: 50%;
  animation: twinkle var(--d) ease-in-out infinite;
  animation-delay: var(--dl);
}
@keyframes twinkle { 0%,100%{opacity:1;} 50%{opacity:0.1;} }

/* Scanlines */
.scanlines {
  position: fixed; inset: 0; z-index: 200; pointer-events: none;
  background: repeating-linear-gradient(to bottom, transparent 0, transparent 3px, rgba(0,0,0,0.18) 3px, rgba(0,0,0,0.18) 4px);
}
.crt-edge {
  position: fixed; inset: 0; z-index: 201; pointer-events: none;
  box-shadow: inset 0 0 80px rgba(180,0,255,0.12), inset 0 0 30px rgba(0,245,255,0.06);
}

/* ── TOPBAR ── */
.topbar {
  position: relative; z-index: 10;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 20px;
  background: rgba(10,0,16,0.95);
  border-bottom: 2px solid var(--purple);
  box-shadow: 0 0 20px rgba(180,0,255,0.4), 0 3px 0 var(--pink);
}
.tb-left { display: flex; align-items: center; gap: 10px; }
.tb-logo {
  width: 36px; height: 36px; object-fit: cover;
  border: 2px solid var(--pink);
  box-shadow: 0 0 8px var(--pink);
}
.tb-name {
  font-size: 0.65rem; color: var(--cyan);
  text-shadow: 0 0 10px var(--cyan), 2px 2px 0 var(--purple);
  letter-spacing: 0.05em;
}
.tb-right {
  font-family: 'VT323', monospace; font-size: 1rem;
  color: var(--pink); text-shadow: 0 0 8px var(--pink);
  animation: blink 1s step-end infinite;
  display: flex; align-items: center; gap: 6px;
}
@keyframes blink { 50%{opacity:0.3;} }

/* ── MAIN GRID ── */
.main {
  position: relative; z-index: 5;
  display: grid;
  grid-template-columns: 1fr 260px;
  grid-template-rows: 1fr;
  overflow: hidden;
  margin-top: 52px;
}

/* ── LEFT AREA ── */
.left {
  display: grid;
  grid-template-rows: 1fr auto;
  overflow: hidden;
}

/* Map preview area */
.map-preview {
  position: relative;
  overflow: hidden;
  display: flex; align-items: center; justify-content: center;
}
.map-preview-img {
  position: absolute; inset: 0;
  background: transparent;
  display: flex; align-items: center; justify-content: center;
}
.map-label {
  position: absolute; bottom: 12px; left: 16px;
  font-family: 'VT323', monospace; font-size: 1.3rem;
  color: var(--cyan); text-shadow: 0 0 12px var(--cyan);
  z-index: 2;
  background: rgba(10,0,16,0.7);
  padding: 2px 10px;
  border: 1px solid var(--cyan);
}

/* Tip box inside map preview */
.preview-tip-box {
  position: absolute;
  bottom: 44px; left: 12px; right: 12px;
  background: rgba(10,0,16,0.82);
  border: 1px solid var(--purple);
  box-shadow: 0 0 12px rgba(180,0,255,0.3);
  padding: 6px 12px;
  z-index: 3;
}
.preview-tip-label {
  font-size: 0.35rem; letter-spacing: 0.15em;
  color: var(--cyan); text-shadow: 0 0 8px var(--cyan);
  margin-bottom: 4px;
}
.tip-text {
  font-family: "VT323", monospace; font-size: 0.85rem;
  color: var(--text); opacity: 0.8; line-height: 1.4;
  transition: opacity 0.4s;
}
.tip-text span { color: var(--yellow); }



/* Bottom left: stats + tips */
.left-bottom {
  padding: 10px 16px;
  background: rgba(10,0,16,0.9);
  border-top: 2px solid var(--grid);
  display: grid;
  grid-template-columns: 1fr 1fr 1fr 1fr auto;
  gap: 10px;
  align-items: center;
}
.mini-stat { min-width: 0; }
.mini-stat {
  border: 1px solid var(--purple);
  padding: 6px 10px;
  background: rgba(180,0,255,0.05);
  box-shadow: inset 0 0 8px rgba(180,0,255,0.1);
}
.mini-stat-val {
  font-family: 'VT323', monospace; font-size: 1.2rem;
  color: var(--pink); text-shadow: 0 0 8px var(--pink); line-height: 1;
}
.mini-stat-key {
  font-size: 0.3rem; letter-spacing: 0.12em; color: var(--dim);
  text-transform: uppercase; margin-top: 2px;
}

/* Mascot in bottom-left stats area */
.mascot-wrap {
  display: flex; align-items: flex-end; justify-content: center;
}
.mascot {
  height: 60px; image-rendering: pixelated;
  filter: drop-shadow(0 0 10px var(--pink));
  animation: mascotBob 2s ease-in-out infinite;
}
@keyframes mascotBob { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-6px);} }

/* ── RIGHT PANEL ── */
.right {
  border-left: 2px solid var(--purple);
  box-shadow: -6px 0 20px rgba(180,0,255,0.2);
  background: rgba(10,0,16,0.85);
  display: flex; flex-direction: column;
  overflow: hidden;
}

.r-section {
  border-bottom: 1px solid var(--grid);
  flex-shrink: 0;
}
.r-title {
  font-size: 0.38rem; letter-spacing: 0.18em;
  color: var(--cyan); text-shadow: 0 0 8px var(--cyan);
  padding: 8px 14px 0;
  display: flex; align-items: center; gap: 5px;
}
.r-title::before { content: '▶'; font-size: 0.4rem; }

/* ── MUSIC PLAYER ── */
.music-player {
  padding: 8px 14px 10px;
}
.music-track-name {
  font-family: 'VT323', monospace; font-size: 0.95rem;
  color: var(--yellow); text-shadow: 0 0 8px var(--yellow);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  margin-bottom: 4px;
}
.music-artist {
  font-family: 'VT323', monospace; font-size: 0.75rem;
  color: var(--dim); margin-bottom: 8px;
}
.music-controls {
  display: flex; align-items: center; gap: 6px; margin-bottom: 6px;
}

.music-progress-track {
  height: 3px; background: var(--grid); border: 1px solid var(--dim);
  position: relative; overflow: hidden;
}
.music-progress-fill {
  height: 100%; width: 0%;
  background: linear-gradient(90deg, var(--purple), var(--pink));
  box-shadow: 0 0 6px var(--pink);
  transition: width 1s linear;
}
.music-time {
  display: flex; justify-content: space-between;
  font-family: 'VT323', monospace; font-size: 0.65rem;
  color: var(--dim); margin-top: 2px;
}

/* Playlist */
.playlist-wrap { flex: 1; overflow-y: auto; }
.playlist-wrap::-webkit-scrollbar { width: 3px; }
.playlist-wrap::-webkit-scrollbar-thumb { background: var(--purple); }
.playlist-item {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 14px;
  border-bottom: 1px solid rgba(180,0,255,0.1);
  cursor: pointer;
  transition: background 0.15s;
}
.playlist-item:hover { background: rgba(180,0,255,0.08); }
.playlist-item.playing { background: rgba(255,45,120,0.08); }
.pl-num {
  font-family: 'VT323', monospace; font-size: 0.7rem; color: var(--dim); width: 14px; flex-shrink: 0;
}
.pl-icon { font-size: 0.5rem; color: var(--pink); width: 10px; flex-shrink: 0; }
.pl-name {
  font-family: 'VT323', monospace; font-size: 0.8rem; color: var(--text);
  flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.pl-dur { font-family: 'VT323', monospace; font-size: 0.65rem; color: var(--dim); }



/* ── LADEBALKEN ── */
.loader {
  position: fixed;
  top: 58px; left: 0; right: 0;
  z-index: 9999;
  background: rgba(10,0,16,0.98);
  border-bottom: 2px solid var(--pink);
  border-top: 1px solid rgba(255,45,120,0.2);
  box-shadow: 0 4px 20px rgba(255,45,120,0.3);
  padding: 6px 18px 8px;
}
.loader-top {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 5px;
}
.loader-msg {
  font-size: 0.35rem; letter-spacing: 0.1em; color: var(--cyan);
  text-shadow: 0 0 8px var(--cyan);
}
.loader-pct {
  font-family: 'VT323', monospace; font-size: 1.2rem;
  color: var(--pink); text-shadow: 0 0 10px var(--pink);
}
.loader-track {
  width: 100%; height: 8px; background: var(--grid);
  border: 1px solid var(--purple); position: relative; overflow: hidden;
}
.loader-bar {
  height: 100%; width: 0%;
  background: repeating-linear-gradient(90deg, var(--pink) 0, var(--pink) 6px, var(--purple) 6px, var(--purple) 12px);
  box-shadow: 0 0 12px var(--pink);
  transition: width 0.3s steps(8);
  position: relative;
}
.loader-bar::after {
  content: '';
  position: absolute; right: 0; top: 0; bottom: 0; width: 3px;
  background: #fff; animation: cur 0.5s step-end infinite;
}
@keyframes cur { 50%{opacity:0;} }
</style>
</head>
<body>

<div class="bg-wrap">
  <canvas id="oceanCanvas"></canvas>
  <div class="bg-stars" id="stars"></div>
</div>
<div class="scanlines"></div>
<div class="crt-edge"></div>

<!-- TOPBAR -->
<div class="topbar">
  <div class="tb-left">
    <img class="tb-logo" src="p.png" alt="Logo">
    <div class="tb-name" id="serverNameDisp">HOUSE OF CRAZY PEOPLE</div>
  </div>
  <div class="tb-right">
    <span>●</span><span id="statusPill">CONNECTING...</span>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- LEFT -->
  <div class="left">
    <!-- Map Preview with Sun + Tips -->
    <div class="map-preview">
      <div class="map-preview-img">
      </div>

      <!-- Tips unten links in der Map Preview -->
      <div class="preview-tip-box">
        <div class="preview-tip-label">▶ TIPP</div>
        <div class="tip-text" id="tipText">&gt; <span>Lade Tipps...</span></div>
      </div>
      <div class="map-label">MAP: <span id="mapDisp">--</span></div>
    </div>

    <!-- Bottom stats row -->
    <div class="left-bottom">
      <div class="mini-stat">
        <div class="mini-stat-val" id="playerCount">--/32</div>
        <div class="mini-stat-key">Spieler</div>
      </div>
      <div class="mini-stat">
        <div class="mini-stat-val">TTT</div>
        <div class="mini-stat-key">Modus</div>
      </div>

      <div class="mini-stat">
        <div class="mini-stat-val" id="pingDisp">--</div>
        <div class="mini-stat-key">Ping ms</div>
      </div>
      <div class="mascot-wrap">
        <img class="mascot" src="p.png" alt="mascot">
      </div>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="right">

    <!-- Music Player -->
    <div class="r-section">
      <div class="r-title">NOW PLAYING</div>
      <div class="music-player">
        <div class="music-track-name" id="trackName">Kein Track</div>
        <div class="music-artist" id="trackArtist">--</div>

        <div class="music-progress-track" id="progressTrack" onclick="seekMusic(event)">
          <div class="music-progress-fill" id="musicProgress"></div>
        </div>
        <div class="music-time">
          <span id="timeNow">0:00</span>
          <span id="timeTotal">0:00</span>
        </div>
      </div>
    </div>





  </div>
</div>

<!-- LADEBALKEN -->
<div class="loader">
  <div class="loader-top">
    <div class="loader-msg" id="loadMsg">VERBINDE MIT SERVER...</div>
    <div class="loader-pct" id="pctTxt">0%</div>
  </div>
  <div class="loader-track">
    <div class="loader-bar" id="pbar"></div>
  </div>
</div>

<audio id="audioPlayer" preload="auto"></audio>

<script>

// ── OCEAN BACKGROUND ──
(function() {
  const canvas = document.getElementById('oceanCanvas');
  const ctx = canvas.getContext('2d');

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  const PINK   = '#ff2d78';
  const PURPLE = '#b400ff';
  const CYAN   = '#00f5ff';
  const YELLOW = '#ffe600';

  // Sun params
  const sun = { r: 90 };

  // Wave layers
  const waveLayers = [
    { amp: 22, freq: 0.012, speed: 0.018, yOff: 0.72, color: 'rgba(90,0,160,0.7)',  lineW: 2 },
    { amp: 18, freq: 0.016, speed: 0.024, yOff: 0.75, color: 'rgba(140,0,200,0.6)', lineW: 1.5 },
    { amp: 14, freq: 0.020, speed: 0.030, yOff: 0.78, color: 'rgba(180,0,255,0.5)', lineW: 1.5 },
    { amp: 12, freq: 0.025, speed: 0.038, yOff: 0.80, color: 'rgba(210,0,255,0.4)', lineW: 1 },
    { amp: 10, freq: 0.030, speed: 0.045, yOff: 0.83, color: 'rgba(0,245,255,0.25)',lineW: 1 },
    { amp:  8, freq: 0.038, speed: 0.055, yOff: 0.86, color: 'rgba(0,200,220,0.2)', lineW: 1 },
    { amp:  6, freq: 0.045, speed: 0.065, yOff: 0.89, color: 'rgba(0,150,180,0.15)',lineW: 1 },
    { amp:  5, freq: 0.055, speed: 0.075, yOff: 0.92, color: 'rgba(180,0,255,0.12)',lineW: 1 },
  ];

  let t = 0;

  function drawSun(W, H) {
    const cx = W / 2;
    const sy = H * 0.35;
    const r  = sun.r;

    // Glow rings
    for (let i = 4; i >= 1; i--) {
      const g = ctx.createRadialGradient(cx, sy, r * 0.8, cx, sy, r * (1 + i * 0.5));
      g.addColorStop(0, 'rgba(255,45,120,0.12)');
      g.addColorStop(1, 'rgba(180,0,255,0)');
      ctx.beginPath();
      ctx.arc(cx, sy, r * (1 + i * 0.5), 0, Math.PI * 2);
      ctx.fillStyle = g;
      ctx.fill();
    }

    // Sun body gradient
    const grad = ctx.createLinearGradient(cx, sy - r, cx, sy + r);
    grad.addColorStop(0.0, YELLOW);
    grad.addColorStop(0.45, PINK);
    grad.addColorStop(1.0, PURPLE);

    ctx.save();
    ctx.beginPath();
    ctx.arc(cx, sy, r, 0, Math.PI * 2);
    ctx.clip();
    ctx.fillStyle = grad;
    ctx.fillRect(cx - r, sy - r, r * 2, r * 2);

    // Horizontal lines (lower half)
    ctx.fillStyle = '#0a0010';
    const lineData = [
      {top: 0.52, h: 0.04},
      {top: 0.60, h: 0.035},
      {top: 0.67, h: 0.03},
      {top: 0.74, h: 0.025},
      {top: 0.80, h: 0.02},
      {top: 0.86, h: 0.018},
      {top: 0.91, h: 0.015},
    ];
    lineData.forEach(l => {
      ctx.fillRect(cx - r, sy - r + l.top * r * 2, r * 2, l.h * r * 2);
    });
    ctx.restore();

    // ── TEXT ÜBER DER SONNE ──
    // "HOUSE OF CRAZY PEOPLE" gesplittet in zwei Zeilen, über der Sonne
    ctx.save();

    // Flackern-Effekt
    const flicker = 0.85 + Math.sin(t * 13.7) * 0.03 + Math.sin(t * 7.3) * 0.02;

    // Obere Zeile: "HOUSE OF"
    const fontSize1 = Math.round(r * 0.38);
    ctx.font = `900 ${fontSize1}px 'Press Start 2P', monospace`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    // Outer glow cyan
    ctx.shadowColor = '#00f5ff';
    ctx.shadowBlur = 22;
    ctx.globalAlpha = flicker;
    ctx.fillStyle = '#00f5ff';
    ctx.fillText('HOUSE OF', cx, sy - r * 1.52);

    // Inner bright white
    ctx.shadowColor = '#ffffff';
    ctx.shadowBlur = 8;
    ctx.fillStyle = '#ffffff';
    ctx.fillText('HOUSE OF', cx, sy - r * 1.52);

    // Untere Zeile: "CRAZY PEOPLE" – größer, pink/gelb
    const fontSize2 = Math.round(r * 0.44);
    ctx.font = `900 ${fontSize2}px 'Press Start 2P', monospace`;

    // Outer glow pink
    ctx.shadowColor = '#ff2d78';
    ctx.shadowBlur = 28;
    ctx.globalAlpha = flicker;
    ctx.fillStyle = '#ff2d78';
    ctx.fillText('CRAZY PEOPLE', cx, sy - r * 1.18);

    // Inner bright
    ctx.shadowColor = '#ffe600';
    ctx.shadowBlur = 10;
    ctx.fillStyle = '#ffe600';
    ctx.fillText('CRAZY PEOPLE', cx, sy - r * 1.18);

    // Dekorative Linie unter dem Text
    ctx.shadowColor = '#b400ff';
    ctx.shadowBlur = 12;
    ctx.strokeStyle = 'rgba(180,0,255,0.7)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(cx - r * 1.1, sy - r * 0.98);
    ctx.lineTo(cx + r * 1.1, sy - r * 0.98);
    ctx.stroke();

    ctx.restore();
  }

  function drawSky(W, H) {
    const grad = ctx.createLinearGradient(0, 0, 0, H * 0.75);
    grad.addColorStop(0.0,  '#0a0010');
    grad.addColorStop(0.35, '#150025');
    grad.addColorStop(0.65, '#200035');
    grad.addColorStop(1.0,  '#0a0010');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);
  }

  function drawOcean(W, H) {
    // Ocean fill below first wave
    const firstY = H * waveLayers[0].yOff;
    const oceanGrad = ctx.createLinearGradient(0, firstY, 0, H);
    oceanGrad.addColorStop(0.0, 'rgba(60,0,100,0.95)');
    oceanGrad.addColorStop(0.4, 'rgba(20,0,50,0.98)');
    oceanGrad.addColorStop(1.0, '#0a0010');
    ctx.fillStyle = oceanGrad;
    ctx.fillRect(0, firstY, W, H - firstY);

    // Sun reflection on ocean
    const cx = W / 2;
    const refGrad = ctx.createLinearGradient(cx, firstY, cx, H * 0.9);
    refGrad.addColorStop(0, 'rgba(255,45,120,0.15)');
    refGrad.addColorStop(1, 'rgba(255,45,120,0)');
    ctx.fillStyle = refGrad;
    // Shimmering reflection column
    const refW = 80 + Math.sin(t * 1.2) * 20;
    ctx.beginPath();
    ctx.moveTo(cx - refW, firstY);
    ctx.lineTo(cx + refW, firstY);
    ctx.lineTo(cx + 20, H * 0.95);
    ctx.lineTo(cx - 20, H * 0.95);
    ctx.closePath();
    ctx.fill();

    // Wave lines
    waveLayers.forEach(layer => {
      const baseY = H * layer.yOff;
      ctx.beginPath();
      ctx.moveTo(0, baseY);
      for (let x = 0; x <= W; x += 2) {
        const y = baseY + Math.sin(x * layer.freq + t * layer.speed * 60) * layer.amp
                        + Math.sin(x * layer.freq * 1.7 + t * layer.speed * 40) * layer.amp * 0.4;
        ctx.lineTo(x, y);
      }
      ctx.lineTo(W, H);
      ctx.lineTo(0, H);
      ctx.closePath();
      ctx.fillStyle = layer.color;
      ctx.fill();

      // Wave highlight line
      ctx.beginPath();
      ctx.moveTo(0, H * layer.yOff);
      for (let x = 0; x <= W; x += 2) {
        const y = baseY + Math.sin(x * layer.freq + t * layer.speed * 60) * layer.amp
                        + Math.sin(x * layer.freq * 1.7 + t * layer.speed * 40) * layer.amp * 0.4;
        ctx.lineTo(x, y);
      }
      ctx.strokeStyle = layer.color.replace(/[\d.]+\)$/, '0.9)');
      ctx.lineWidth = layer.lineW;
      ctx.stroke();
    });


  }


  function drawMountains(W, H) {
    const sunY = H * 0.42;
    const horizonY = H * 0.62;

    // Back mountains (darker, behind sun)
    const backPeaks = [
      {x: 0.05, h: 0.13}, {x: 0.18, h: 0.20}, {x: 0.30, h: 0.15},
      {x: 0.42, h: 0.24}, {x: 0.55, h: 0.18}, {x: 0.67, h: 0.22},
      {x: 0.80, h: 0.16}, {x: 0.92, h: 0.19}, {x: 1.02, h: 0.12}
    ];

    ctx.beginPath();
    ctx.moveTo(0, horizonY);
    backPeaks.forEach((p, i) => {
      const px = W * p.x;
      const py = horizonY - H * p.h;
      if (i === 0) ctx.lineTo(px, py);
      else {
        const prev = backPeaks[i - 1];
        const mx = W * (prev.x + p.x) / 2;
        ctx.quadraticCurveTo(W * prev.x, horizonY - H * prev.h, mx, (horizonY - H * prev.h + horizonY - H * p.h) / 2);
        ctx.quadraticCurveTo(mx, horizonY - H * p.h, px, py);
      }
    });
    ctx.lineTo(W, horizonY);
    ctx.closePath();
    const backGrad = ctx.createLinearGradient(0, horizonY - H * 0.24, 0, horizonY);
    backGrad.addColorStop(0, '#1a0030');
    backGrad.addColorStop(1, '#0d0020');
    ctx.fillStyle = backGrad;
    ctx.fill();

    // Mountain edge glow (pink/purple outline)
    ctx.beginPath();
    ctx.moveTo(0, horizonY);
    backPeaks.forEach((p, i) => {
      const px = W * p.x;
      const py = horizonY - H * p.h;
      if (i === 0) ctx.lineTo(px, py);
      else {
        const prev = backPeaks[i - 1];
        const mx = W * (prev.x + p.x) / 2;
        ctx.quadraticCurveTo(W * prev.x, horizonY - H * prev.h, mx, (horizonY - H * prev.h + horizonY - H * p.h) / 2);
        ctx.quadraticCurveTo(mx, horizonY - H * p.h, px, py);
      }
    });
    ctx.strokeStyle = 'rgba(180,0,255,0.6)';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Front mountains (darker silhouette)
    const frontPeaks = [
      {x: -0.02, h: 0.10}, {x: 0.10, h: 0.17}, {x: 0.22, h: 0.12},
      {x: 0.35, h: 0.19}, {x: 0.50, h: 0.08}, {x: 0.65, h: 0.16},
      {x: 0.78, h: 0.20}, {x: 0.90, h: 0.13}, {x: 1.02, h: 0.15}
    ];

    ctx.beginPath();
    ctx.moveTo(0, horizonY);
    frontPeaks.forEach((p, i) => {
      const px = W * p.x;
      const py = horizonY - H * p.h;
      if (i === 0) ctx.lineTo(px, py);
      else {
        const prev = frontPeaks[i - 1];
        const mx = W * (prev.x + p.x) / 2;
        ctx.quadraticCurveTo(W * prev.x, horizonY - H * prev.h, mx, (horizonY - H * prev.h + horizonY - H * p.h) / 2);
        ctx.quadraticCurveTo(mx, horizonY - H * p.h, px, py);
      }
    });
    ctx.lineTo(W, horizonY);
    ctx.closePath();
    const frontGrad = ctx.createLinearGradient(0, horizonY - H * 0.20, 0, horizonY);
    frontGrad.addColorStop(0, '#0d0020');
    frontGrad.addColorStop(1, '#080015');
    ctx.fillStyle = frontGrad;
    ctx.fill();

    // Front mountain pink glow edge
    ctx.beginPath();
    ctx.moveTo(0, horizonY);
    frontPeaks.forEach((p, i) => {
      const px = W * p.x;
      const py = horizonY - H * p.h;
      if (i === 0) ctx.lineTo(px, py);
      else {
        const prev = frontPeaks[i - 1];
        const mx = W * (prev.x + p.x) / 2;
        ctx.quadraticCurveTo(W * prev.x, horizonY - H * prev.h, mx, (horizonY - H * prev.h + horizonY - H * p.h) / 2);
        ctx.quadraticCurveTo(mx, horizonY - H * p.h, px, py);
      }
    });
    ctx.strokeStyle = 'rgba(255,45,120,0.7)';
    ctx.lineWidth = 2;
    ctx.stroke();
  }


  // Shooting stars
  const shootingStars = Array.from({length: 5}, () => ({
    x: Math.random() * 0.4,
    y: Math.random() * 0.3,
    speed: 0.12 + Math.random() * 0.18,
    len: 0.10 + Math.random() * 0.10,
    delay: Math.random() * 10,
    active: false
  }));

  function drawExtras(W, H, t) {
    const horizonY = H * 0.62;
    const cx = W / 2;

    // ── SHOOTING STARS (links oben → rechts unten) ──
    shootingStars.forEach(s => {
      const lt = (t + s.delay) % 10;
      if (lt > 6) return;
      const prog = lt / 6;
      // Start oben links, Ende rechts unten
      const ex = W * (s.x + prog * s.speed * 2.5);
      const ey = H * s.y + prog * H * 0.12;
      const sx = ex - W * s.len;
      const sy2 = ey - H * s.len * 0.4;
      const alpha = Math.sin(prog * Math.PI);
      const g = ctx.createLinearGradient(sx, sy2, ex, ey);
      g.addColorStop(0, `rgba(255,255,255,0)`);
      g.addColorStop(1, `rgba(255,255,255,${alpha * 0.95})`);
      ctx.beginPath();
      ctx.moveTo(sx, sy2);
      ctx.lineTo(ex, ey);
      ctx.strokeStyle = g;
      ctx.lineWidth = 1.8;
      ctx.shadowColor = '#fff';
      ctx.shadowBlur = 8;
      ctx.stroke();
      ctx.shadowBlur = 0;
    });

    // ── PALM TREES ── (left and right)
    function drawPalm(px, py, scale, flip) {
      ctx.save();
      ctx.translate(px, py);
      if (flip) ctx.scale(-1, 1);

      // Trunk
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.bezierCurveTo(
        scale * 8,  -scale * 30,
        scale * -5, -scale * 60,
        scale * 10, -scale * 100
      );
      ctx.strokeStyle = '#2a0040';
      ctx.lineWidth = scale * 7;
      ctx.stroke();
      ctx.strokeStyle = 'rgba(255,45,120,0.6)';
      ctx.lineWidth = scale * 2.5;
      ctx.stroke();

      // Fronds
      const fronds = [
        {ax:-20, ay:-10, bx:-50, by:-50, cx:-80, cy:-30},
        {ax:-15, ay:-15, bx:-55, by:-70, cx:-40, cy:-90},
        {ax:0,   ay:-20, bx:0,   by:-80, cx:30,  cy:-100},
        {ax:15,  ay:-15, bx:55,  by:-70, cx:70,  cy:-50},
        {ax:20,  ay:-10, bx:60,  by:-40, cx:90,  cy:-20},
      ];
      fronds.forEach(f => {
        ctx.beginPath();
        ctx.moveTo(scale*10, scale*-100);
        ctx.bezierCurveTo(
          scale*(10+f.ax), scale*(-100+f.ay),
          scale*(10+f.bx), scale*(-100+f.by),
          scale*(10+f.cx), scale*(-100+f.cy)
        );
        ctx.strokeStyle = '#0d0020';
        ctx.lineWidth = scale * 5;
        ctx.stroke();
        ctx.strokeStyle = 'rgba(180,0,255,0.7)';
        ctx.lineWidth = scale * 2.5;
        ctx.stroke();
      });
      ctx.restore();
    }

    // Left palms
    drawPalm(W * 0.06, horizonY, 0.9, false);
    drawPalm(W * 0.13, horizonY + 8, 0.7, false);
    // Right palms (flipped)
    drawPalm(W * 0.94, horizonY, 0.9, true);
    drawPalm(W * 0.87, horizonY + 8, 0.7, true);

    // ── BIRDS ── (simple V shapes flying)
    const birdGroup = [
      {ox: 0.2, oy: 0.12, speed: 0.022},
      {ox: 0.3, oy: 0.08, speed: 0.018},
      {ox: 0.15, oy: 0.16, speed: 0.025},
      {ox: 0.25, oy: 0.10, speed: 0.020},
      {ox: 0.35, oy: 0.14, speed: 0.016},
    ];
    birdGroup.forEach((b, i) => {
      const bx = ((b.ox + t * b.speed) % 1.3 - 0.15) * W;
      const by = H * b.oy + Math.sin(t * 2 + i) * 8;
      const size = 5 + i * 1.5;
      ctx.beginPath();
      ctx.moveTo(bx - size, by - size * 0.4);
      ctx.quadraticCurveTo(bx, by - size * 0.8, bx + size, by - size * 0.4);
      ctx.strokeStyle = 'rgba(180,0,255,0.55)';
      ctx.lineWidth = 1.5;
      ctx.shadowColor = '#b400ff';
      ctx.shadowBlur = 4;
      ctx.stroke();
      ctx.shadowBlur = 0;
    });

    // ── HORIZONTAL NEON LINES across sky (retro vibe) ──
    const lineYs = [0.20, 0.25, 0.28];
    lineYs.forEach((ly, i) => {
      const alpha = 0.06 + Math.sin(t * 0.8 + i) * 0.02;
      ctx.beginPath();
      ctx.moveTo(0, H * ly);
      ctx.lineTo(W, H * ly);
      ctx.strokeStyle = `rgba(180,0,255,${alpha})`;
      ctx.lineWidth = 1;
      ctx.stroke();
    });
  }

  function frame(ts) {
    t = ts * 0.001;
    const W = canvas.width;
    const H = canvas.height;
    ctx.clearRect(0, 0, W, H);
    drawSky(W, H);
    drawSun(W, H);
    drawMountains(W, H);
    drawExtras(W, H, t);
    drawOcean(W, H);
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
})();

// ── MUSIK PLAYER ──
// ── MUSIK PLAYER ──
const audio = document.getElementById('audioPlayer');
let playlist = [];
let currentTrack = 0;
let isPlaying = false;
let volume = 0.7;
audio.volume = volume;

fetch('playlist.json')
  .then(r => r.json())
  .then(data => {
    playlist = data;
    loadTrack(0);
    setTimeout(() => { playTrack(); }, 500);
  })
  .catch(() => {
    playlist = [{ name: "Keine playlist.json", artist: "Erstelle playlist.json!", file: "" }];
    document.getElementById('trackName').textContent = "Keine playlist.json";
    document.getElementById('trackArtist').textContent = "Erstelle playlist.json!";
  });

function loadTrack(idx) {
  const t = playlist[idx];
  if (!t) return;
  currentTrack = idx;
  document.getElementById('trackName').textContent = t.name || 'Unbekannt';
  document.getElementById('trackArtist').textContent = t.artist || '--';
  if (t.file) { audio.src = t.file; audio.load(); }
}

function playTrack() {
  if (!playlist[currentTrack] || !playlist[currentTrack].file) return;
  // Connect to analyser on first play
  if (!analyserConnected) connectAnalyser();
  audio.play().then(() => {
    isPlaying = true;
    document.getElementById('btnPlay').textContent = '⏸ PAUSE';
  }).catch(() => {});
}

function togglePlay() {
  if (isPlaying) {
    audio.pause();
    isPlaying = false;
    document.getElementById('btnPlay').textContent = '▶ PLAY';
  } else {
    playTrack();
  }
}

function nextTrack() {
  const next = (currentTrack + 1) % playlist.length;
  loadTrack(next);
  if (isPlaying) setTimeout(playTrack, 100);
}

function setVolume(e) {
  const rect = document.getElementById('volTrack').getBoundingClientRect();
  volume = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  audio.volume = volume;
  document.getElementById('volFill').style.width = (volume * 100) + '%';
}

function seekMusic(e) {
  if (!audio.duration) return;
  const rect = document.getElementById('progressTrack').getBoundingClientRect();
  audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
}

audio.addEventListener('ended', nextTrack);

// ── MUSIC VISUALISER ──
let audioCtx, analyser, source, dataArray, analyserConnected = false;

function connectAnalyser() {
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 128;
    dataArray = new Uint8Array(analyser.frequencyBinCount);
    source = audioCtx.createMediaElementSource(audio);
    source.connect(analyser);
    analyser.connect(audioCtx.destination);
    analyserConnected = true;
  } catch(e) {}
}

let visCanvas, visCtx;

function drawVisualiser() {
  requestAnimationFrame(drawVisualiser);
  const W = visCanvas.offsetWidth;
  const H = visCanvas.offsetHeight;
  visCanvas.width = W;
  visCanvas.height = H;

  visCtx.clearRect(0, 0, W, H);
  visCtx.fillStyle = 'rgba(10,0,16,0.85)';
  visCtx.fillRect(0, 0, W, H);

  if (!analyserConnected || !isPlaying) {
    // Idle animation - smooth waves
    const now = Date.now() / 1000;
    const bars = 32;
    const bw = W / bars;
    for (let i = 0; i < bars; i++) {
      const h = (Math.sin(now * 2 + i * 0.4) * 0.3 + 0.35) * H * 0.4;
      const x = i * bw;
      const hue = i / bars;
      const r = Math.round(180 + hue * 75);
      const g = 0;
      const b = Math.round(255 - hue * 100);
      visCtx.fillStyle = `rgba(${r},${g},${b},0.4)`;
      visCtx.fillRect(x + 1, H/2 - h/2, bw - 2, h);
    }
    return;
  }

  analyser.getByteFrequencyData(dataArray);
  const bars = dataArray.length;
  const bw = W / bars;

  for (let i = 0; i < bars; i++) {
    const v = dataArray[i] / 255;
    const h = v * H * 0.95;
    const x = i * bw;

    // Color gradient: purple → pink → cyan
    const t2 = i / bars;
    const r = Math.round(180 - t2 * 180 + v * 75);
    const g = Math.round(v * 50);
    const b = Math.round(255 - t2 * 100 + v * 50);

    // Bar
    const grad = visCtx.createLinearGradient(0, H, 0, H - h);
    grad.addColorStop(0, `rgba(${r},${g},${b},0.9)`);
    grad.addColorStop(1, `rgba(255,255,255,0.6)`);
    visCtx.fillStyle = grad;
    visCtx.fillRect(x + 1, H - h, bw - 2, h);

    // Glow top cap
    visCtx.fillStyle = `rgba(255,255,255,${v * 0.9})`;
    visCtx.fillRect(x + 1, H - h - 2, bw - 2, 2);

    // Reflection
    visCtx.fillStyle = `rgba(${r},${g},${b},0.15)`;
    visCtx.fillRect(x + 1, H - h/4, bw - 2, h/4);
  }
}
window.addEventListener('DOMContentLoaded', () => {
  visCanvas = document.getElementById('visualiserCanvas');
  if (visCanvas) {
    visCtx = visCanvas.getContext('2d');
    drawVisualiser();
  }
});

// Progress update
function formatTime(s) {
  const m = Math.floor(s / 60);
  return m + ':' + String(Math.floor(s % 60)).padStart(2,'0');
}
setInterval(() => {
  if (!audio.duration) return;
  const pct = (audio.currentTime / audio.duration) * 100;
  document.getElementById('musicProgress').style.width = pct + '%';
  document.getElementById('timeNow').textContent = formatTime(audio.currentTime);
  document.getElementById('timeTotal').textContent = formatTime(audio.duration);
}, 500);
