<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>House of Crazy People – TTT</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --pink:   #ff2d78;
  --purple: #b400ff;
  --cyan:   #00f5ff;
  --yellow: #ffe600;
  --green:  #00ff88;
  --bg:     #07000d;
  --bg2:    #0d0018;
  --dim:    #4a2060;
  --text:   #d8a0f8;
  --gmod:   36px;
}

html, body { width: 100%; height: 100%; overflow: hidden; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Press Start 2P', monospace;
  display: flex;
  flex-direction: column;
}

.scene {
  position: fixed; inset: 0; z-index: 0;
  background: linear-gradient(180deg,
    #04000a 0%,
    #0c0018 25%,
    #160028 45%,
    #1e0035 58%,
    #140025 70%,
    #08000f 100%
  );
}

.stars { position: fixed; inset: 0; z-index: 1; pointer-events: none; }
.star {
  position: absolute;
  border-radius: 50%;
  background: #fff;
  animation: twinkle var(--d, 3s) ease-in-out infinite;
  animation-delay: var(--dl, 0s);
}
@keyframes twinkle { 0%,100%{opacity:1;transform:scale(1);} 50%{opacity:0.1;transform:scale(0.5);} }

.sun-wrap {
  position: fixed;
  left: 50%;
  bottom: 34%;
  transform: translateX(-50%);
  z-index: 3;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.sun-label {
  text-align: center;
  margin-bottom: 10px;
  animation: labelFlicker 8s ease-in-out infinite;
}
@keyframes labelFlicker {
  0%,88%,100%{opacity:1;} 90%{opacity:0.3;} 92%{opacity:1;} 95%{opacity:0.5;} 97%{opacity:1;}
}
.sun-label-top {
  display: block;
  font-size: 0.65rem;
  letter-spacing: 0.15em;
  color: var(--cyan);
  text-shadow: 0 0 20px var(--cyan), 0 0 40px rgba(0,245,255,0.4);
  margin-bottom: 5px;
}
.sun-label-bot {
  display: block;
  font-size: 0.9rem;
  letter-spacing: 0.08em;
  color: var(--yellow);
  text-shadow: 0 0 20px var(--yellow), 0 0 40px rgba(255,230,0,0.5), 3px 3px 0 rgba(180,0,255,0.5);
}

.sun {
  width: 180px; height: 180px;
  border-radius: 50%;
  background: linear-gradient(180deg,
    #fff5a0 0%,
    #ffe600 15%,
    #ff8c00 35%,
    #ff2d78 60%,
    #cc00dd 80%,
    #7700bb 100%
  );
  box-shadow:
    0 0 40px rgba(255,45,120,0.8),
    0 0 80px rgba(180,0,255,0.5),
    0 0 160px rgba(255,45,120,0.2);
  overflow: hidden;
  position: relative;
  animation: sunGlow 4s ease-in-out infinite;
}
@keyframes sunGlow {
  0%,100% { box-shadow: 0 0 40px rgba(255,45,120,0.8), 0 0 80px rgba(180,0,255,0.5), 0 0 160px rgba(255,45,120,0.2); }
  50%      { box-shadow: 0 0 60px rgba(255,45,120,1),   0 0 120px rgba(180,0,255,0.8), 0 0 200px rgba(255,45,120,0.3); }
}
.sun::after {
  content: '';
  position: absolute;
  top: 50%; left: 0; right: 0; bottom: 0;
  background: repeating-linear-gradient(
    to bottom,
    var(--bg) 0, var(--bg) 4px,
    transparent 4px, transparent 10px,
    var(--bg) 10px, var(--bg) 13px,
    transparent 13px, transparent 20px,
    var(--bg) 20px, var(--bg) 22px,
    transparent 22px, transparent 28px,
    var(--bg) 28px, var(--bg) 29px,
    transparent 29px, transparent 200px
  );
}
.sun-reflection {
  position: fixed;
  left: 50%; transform: translateX(-50%);
  bottom: 0;
  width: 4px;
  height: 34%;
  background: linear-gradient(to bottom, rgba(255,45,120,0.4), transparent);
  box-shadow: 0 0 20px rgba(255,45,120,0.3);
  z-index: 3;
  animation: reflShimmer 3s ease-in-out infinite;
}
@keyframes reflShimmer { 0%,100%{width:4px;opacity:0.5;} 50%{width:12px;opacity:0.8;} }

.mtn-back {
  position: fixed;
  bottom: 28%;
  left: 0; right: 0;
  height: 160px;
  z-index: 4;
  background: #0e001e;
  clip-path: polygon(
    0 100%, 0 60%,
    3% 35%, 7% 55%, 11% 20%, 15% 48%, 20% 10%,
    25% 42%, 29% 18%, 34% 45%, 39% 5%,
    44% 38%, 48% 22%, 53% 50%, 57% 12%,
    62% 40%, 66% 25%, 71% 52%, 76% 8%,
    81% 42%, 85% 20%, 89% 48%, 93% 15%,
    97% 45%, 100% 30%, 100% 100%
  );
  filter: drop-shadow(0 -3px 8px rgba(180,0,255,0.5));
}
.mtn-back::after {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, transparent, rgba(180,0,255,0.8), var(--purple), rgba(180,0,255,0.8), transparent);
  box-shadow: 0 0 10px var(--purple);
}

.mtn-front {
  position: fixed;
  bottom: 22%;
  left: 0; right: 0;
  height: 130px;
  z-index: 5;
  background: #09000f;
  clip-path: polygon(
    0 100%, 0 75%,
    4% 45%, 8% 68%, 13% 30%, 18% 60%, 23% 22%,
    28% 55%, 33% 35%, 38% 65%, 43% 18%,
    48% 50%, 52% 72%, 57% 28%, 62% 58%,
    67% 38%, 72% 65%, 77% 20%, 82% 55%,
    87% 35%, 91% 62%, 95% 40%, 100% 58%,
    100% 100%
  );
  filter: drop-shadow(0 -4px 6px rgba(255,45,120,0.5));
}
.mtn-front::after {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent, rgba(255,45,120,0.9), var(--pink), rgba(255,45,120,0.9), transparent);
  box-shadow: 0 0 12px var(--pink);
}

.horizon {
  position: fixed;
  bottom: 22%;
  left: 0; right: 0; height: 2px;
  z-index: 6;
  background: linear-gradient(90deg, transparent 0%, var(--pink) 20%, var(--cyan) 50%, var(--pink) 80%, transparent 100%);
  box-shadow: 0 0 16px var(--pink), 0 0 32px rgba(180,0,255,0.4);
}

.ocean {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 22%;
  z-index: 6;
  background: linear-gradient(180deg, #100020 0%, #07000d 100%);
  overflow: hidden;
}
.wave {
  position: absolute; left: -10%; right: -10%;
  height: 1px;
  border-radius: 50%;
  animation: waveAnim linear infinite;
  opacity: 0;
}
.wave:nth-child(1)  { top: 5%;  height:2px; background: linear-gradient(90deg,transparent,rgba(255,45,120,0.7),transparent); animation-duration:5s;  animation-delay:0s;   }
.wave:nth-child(2)  { top: 15%; height:1px; background: linear-gradient(90deg,transparent,rgba(180,0,255,0.5),transparent); animation-duration:6.5s;animation-delay:0.8s; }
.wave:nth-child(3)  { top: 27%; height:2px; background: linear-gradient(90deg,transparent,rgba(0,245,255,0.4),transparent); animation-duration:7s;  animation-delay:1.5s; }
.wave:nth-child(4)  { top: 40%; height:1px; background: linear-gradient(90deg,transparent,rgba(255,45,120,0.3),transparent); animation-duration:8s;  animation-delay:0.3s; }
.wave:nth-child(5)  { top: 55%; height:1px; background: linear-gradient(90deg,transparent,rgba(180,0,255,0.25),transparent);animation-duration:9s;  animation-delay:1.2s; }
.wave:nth-child(6)  { top: 68%; height:1px; background: linear-gradient(90deg,transparent,rgba(0,245,255,0.2),transparent); animation-duration:10s; animation-delay:2s;   }
.wave:nth-child(7)  { top: 80%; height:1px; background: linear-gradient(90deg,transparent,rgba(255,45,120,0.15),transparent);animation-duration:11s; animation-delay:0.6s; }
.wave:nth-child(8)  { top: 90%; height:1px; background: linear-gradient(90deg,transparent,rgba(180,0,255,0.1),transparent); animation-duration:12s; animation-delay:1.8s; }
@keyframes waveAnim {
  0%   { transform:translateX(-5%) scaleX(0.95); opacity:0;   }
  10%  { opacity:1; }
  50%  { transform:translateX(5%)  scaleX(1.05); opacity:0.8; }
  90%  { opacity:1; }
  100% { transform:translateX(-5%) scaleX(0.95); opacity:0;   }
}

.scanlines {
  position: fixed; inset: 0; z-index: 100; pointer-events: none;
  background: repeating-linear-gradient(to bottom, transparent 0, transparent 2px, rgba(0,0,0,0.12) 2px, rgba(0,0,0,0.12) 4px);
}

.topbar {
  position: relative; z-index: 200;
  display: flex; align-items: center; justify-content: space-between;
  height: 54px;
  padding: 0 20px;
  background: rgba(7,0,13,0.96);
  border-bottom: 2px solid var(--purple);
  box-shadow: 0 0 24px rgba(180,0,255,0.4), 0 3px 0 var(--pink);
  flex-shrink: 0;
}
.tb-left { display: flex; align-items: center; gap: 12px; }
.tb-logo { width: 36px; height: 36px; object-fit: cover; border: 2px solid var(--pink); box-shadow: 0 0 10px var(--pink); }
.tb-name { font-size: 0.65rem; color: var(--cyan); text-shadow: 0 0 12px var(--cyan), 2px 2px 0 rgba(180,0,255,0.5); letter-spacing: 0.06em; }
.tb-status {
  font-family: 'VT323', monospace; font-size: 1rem;
  color: var(--pink); text-shadow: 0 0 10px var(--pink);
  display: flex; align-items: center; gap: 6px;
  animation: blink 1.2s step-end infinite;
}
.tb-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--pink); box-shadow: 0 0 8px var(--pink); }
@keyframes blink { 50%{opacity:0.25;} }

.loader {
  position: relative; z-index: 200;
  flex-shrink: 0;
  background: rgba(7,0,13,0.98);
  border-bottom: 2px solid rgba(180,0,255,0.4);
  padding: 6px 20px 8px;
  box-shadow: 0 4px 20px rgba(255,45,120,0.2);
}
.loader-top {
  display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px;
}
.loader-msg { font-size: 0.35rem; letter-spacing: 0.12em; color: var(--cyan); text-shadow: 0 0 8px var(--cyan); }
.loader-pct { font-family: 'VT323', monospace; font-size: 1.3rem; color: var(--pink); text-shadow: 0 0 12px var(--pink); }
.loader-track {
  width: 100%; height: 10px;
  background: rgba(180,0,255,0.1);
  border: 1px solid rgba(180,0,255,0.4);
  border-radius: 1px;
  overflow: hidden;
  position: relative;
}
.loader-bar {
  height: 100%; width: 0%;
  background: repeating-linear-gradient(90deg,
    var(--pink) 0, var(--pink) 8px,
    var(--purple) 8px, var(--purple) 16px
  );
  box-shadow: 0 0 16px var(--pink);
  transition: width 0.3s ease;
  position: relative;
}
.loader-bar::after {
  content: ''; position: absolute; right: 0; top: 0; bottom: 0; width: 3px;
  background: #fff; box-shadow: 0 0 8px #fff;
  animation: cur 0.5s step-end infinite;
}
@keyframes cur { 50%{opacity:0;} }

.main {
  flex: 1;
  display: grid;
  grid-template-columns: 1fr 270px;
  position: relative; z-index: 150;
  overflow: hidden;
  min-height: 0;
}

.left { position: relative; display: flex; flex-direction: column; justify-content: flex-end; }

.info-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  padding: 10px 16px;
  background: rgba(7,0,13,0.88);
  border-top: 1px solid rgba(180,0,255,0.25);
  backdrop-filter: blur(4px);
}
.info-box {
  background: rgba(180,0,255,0.05);
  border: 1px solid rgba(180,0,255,0.35);
  padding: 8px 10px;
  position: relative;
  overflow: hidden;
}
.info-box::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--purple), transparent);
}
.info-val {
  font-family: 'VT323', monospace; font-size: 1.3rem;
  color: var(--pink); text-shadow: 0 0 10px var(--pink); line-height: 1;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.info-key {
  font-size: 0.28rem; letter-spacing: 0.15em; color: var(--dim);
  text-transform: uppercase; margin-top: 3px;
}

.tip-area {
  padding: 8px 16px;
  background: rgba(7,0,13,0.82);
  border-top: 1px solid rgba(180,0,255,0.15);
}
.tip-lbl { font-size: 0.32rem; letter-spacing: 0.15em; color: var(--cyan); margin-bottom: 4px; }
.tip-txt {
  font-family: 'VT323', monospace; font-size: 0.9rem;
  color: rgba(220,170,255,0.85); line-height: 1.4;
  transition: opacity 0.4s;
}
.tip-txt span { color: var(--yellow); }

.right {
  border-left: 2px solid rgba(180,0,255,0.5);
  box-shadow: -8px 0 30px rgba(180,0,255,0.15);
  background: rgba(7,0,13,0.92);
  display: flex; flex-direction: column;
  overflow: hidden;
  backdrop-filter: blur(4px);
}

.panel-hdr {
  font-size: 0.36rem; letter-spacing: 0.18em; color: var(--cyan);
  text-shadow: 0 0 8px var(--cyan);
  padding: 8px 14px 5px;
  display: flex; align-items: center; gap: 5px;
  flex-shrink: 0;
  border-bottom: 1px solid rgba(180,0,255,0.15);
}
.panel-hdr::before { content: '▶'; font-size: 0.38rem; color: var(--pink); }

.music-block { padding: 8px 14px 10px; flex-shrink: 0; }
.now-track {
  font-family: 'VT323', monospace; font-size: 1rem;
  color: var(--yellow); text-shadow: 0 0 10px var(--yellow);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  margin-bottom: 2px;
}
.now-artist { font-family: 'VT323', monospace; font-size: 0.78rem; color: var(--dim); margin-bottom: 8px; }
.mus-prog { height: 3px; background: rgba(180,0,255,0.2); border: 1px solid rgba(180,0,255,0.3); cursor: pointer; margin-bottom: 3px; }
.mus-prog-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--purple), var(--pink)); box-shadow: 0 0 6px var(--pink); transition: width 1s linear; }
.mus-time { display: flex; justify-content: space-between; font-family: 'VT323', monospace; font-size: 0.62rem; color: var(--dim); }

.vis-block { padding: 4px 14px 8px; flex-shrink: 0; }
.vis-bars {
  display: flex; align-items: flex-end; gap: 2px;
  height: 55px;
  background: rgba(0,0,0,0.4);
  border: 1px solid rgba(180,0,255,0.2);
  border-radius: 1px;
  padding: 3px;
  overflow: hidden;
}
.vbar {
  flex: 1; min-height: 2px; border-radius: 1px 1px 0 0;
  background: linear-gradient(to top, var(--purple), var(--pink), #fff);
  box-shadow: 0 0 4px var(--pink);
  transition: height 0.08s ease;
}

.players-block { flex: 1; display: flex; flex-direction: column; min-height: 0; border-top: 1px solid rgba(180,0,255,0.15); }
.players-scroll { flex: 1; overflow-y: auto; padding: 4px 0; }
.players-scroll::-webkit-scrollbar { width: 3px; }
.players-scroll::-webkit-scrollbar-thumb { background: var(--purple); }
.p-row {
  display: flex; align-items: center; gap: 8px;
  padding: 5px 14px;
  border-bottom: 1px solid rgba(180,0,255,0.07);
  animation: rowIn 0.3s ease both;
  animation-delay: calc(var(--i,0) * 0.04s);
}
@keyframes rowIn { from{opacity:0;transform:translateX(8px);} to{opacity:1;} }
.p-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; background: var(--c, var(--purple)); box-shadow: 0 0 5px var(--c, var(--purple)); }
.p-name { font-family: 'VT323', monospace; font-size: 0.85rem; color: var(--text); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.p-ping { font-family: 'VT323', monospace; font-size: 0.72rem; }
.p-ping.g { color: var(--green); } .p-ping.o { color: var(--yellow); } .p-ping.b { color: var(--pink); }
.p-empty { padding: 12px 14px; font-family: 'VT323', monospace; font-size: 0.8rem; color: var(--dim); line-height: 2; }
</style>
</head>
<body>

<div class="scene"></div>
<div class="stars" id="stars"></div>

<div class="sun-wrap">
  <div class="sun-label">
    <span class="sun-label-top">HOUSE OF</span>
    <span class="sun-label-bot">CRAZY PEOPLE</span>
  </div>
  <div class="sun"></div>
</div>
<div class="sun-reflection"></div>

<div class="mtn-back"></div>
<div class="mtn-front"></div>
<div class="horizon"></div>

<div class="ocean">
  <div class="wave"></div><div class="wave"></div><div class="wave"></div>
  <div class="wave"></div><div class="wave"></div><div class="wave"></div>
  <div class="wave"></div><div class="wave"></div>
</div>

<div class="scanlines"></div>

<!-- TOPBAR: Name ist jetzt fix hartcodiert, GameDetails überschreibt ihn NICHT mehr -->
<div class="topbar">
  <div class="tb-left">
    <img class="tb-logo" src="p.png" alt="">
    <span class="tb-name">HOUSE OF CRAZY PEOPLE</span>
  </div>
  <div class="tb-status">
    <div class="tb-dot"></div>
    <span id="statusTxt">CONNECTING...</span>
  </div>
</div>

<div class="loader">
  <div class="loader-top">
    <div class="loader-msg" id="loadMsg">VERBINDE MIT SERVER...</div>
    <div class="loader-pct" id="pctTxt">0%</div>
  </div>
  <div class="loader-track">
    <div class="loader-bar" id="pbar"></div>
  </div>
</div>

<div class="main">

  <div class="left">
    <div class="tip-area">
      <div class="tip-lbl">▶ TIPP</div>
      <div class="tip-txt" id="tipTxt"><span>Lade Tipps...</span></div>
    </div>
    <div class="info-row">
      <div class="info-box">
        <div class="info-val" id="playerCount">--/32</div>
        <div class="info-key">Spieler</div>
      </div>
      <div class="info-box">
        <div class="info-val" id="mapDisp" style="font-size:0.85rem;">--</div>
        <div class="info-key">Map</div>
      </div>
      <div class="info-box">
        <div class="info-val">TTT</div>
        <div class="info-key">Modus</div>
      </div>
      <div class="info-box">
        <div class="info-val" id="pingDisp">--</div>
        <div class="info-key">Ping ms</div>
      </div>
    </div>
  </div>

  <div class="right">

    <div class="panel-hdr">NOW PLAYING</div>
    <div class="music-block">
      <div class="now-track" id="trackName">Lade Musik...</div>
      <div class="now-artist" id="trackArtist">--</div>
      <div class="mus-prog" id="musTrack">
        <div class="mus-prog-fill" id="musFill"></div>
      </div>
      <div class="mus-time">
        <span id="tNow">0:00</span>
        <span id="tTot">0:00</span>
      </div>
    </div>

    <div class="panel-hdr">VISUALISER</div>
    <div class="vis-block">
      <div class="vis-bars" id="visBars"></div>
    </div>

    <div class="panel-hdr">SPIELER ONLINE</div>
    <div class="players-block">
      <div class="players-scroll" id="playerList">
        <div class="p-empty">&gt; Warte auf<br>&gt; Serverdaten...<br>&gt; _</div>
      </div>
    </div>

  </div>
</div>

<audio id="aud" preload="auto"></audio>

<script>
// ── STARS ──
var starEl = document.getElementById('stars');
var starData = [
  [2,120,40],[1,250,80],[2,380,25],[1,500,65],[2,630,18],[1,770,85],[2,910,42],[1,1060,72],
  [1,80,155],[2,310,175],[1,460,130],[2,610,195],[1,820,158],[2,970,185],[1,1130,142],
  [2,170,248],[1,340,275],[2,530,238],[1,720,295],[2,880,258],[1,1040,285],[2,195,325],
  [1,55,360],[2,290,380],[1,480,345],[2,665,375],[1,855,342],[2,1010,368],[1,1175,350],
  [3,230,55],[3,580,38],[3,950,72],[3,1160,48],[3,370,175],[3,720,148]
];
starData.forEach(function(s) {
  var el = document.createElement('div');
  el.className = 'star';
  el.style.cssText = 'width:'+s[0]+'px;height:'+s[0]+'px;left:'+s[1]+'px;top:'+s[2]+'px;--d:'+(2+Math.random()*3)+'s;--dl:'+(Math.random()*3)+'s;opacity:'+(0.4+Math.random()*0.6);
  starEl.appendChild(el);
});

// ── URL PARAMS ──
var params = new URLSearchParams(window.location.search);
if (params.get('map')) document.getElementById('mapDisp').textContent = params.get('map').replace('ttt_','').replace(/_/g,' ').toUpperCase();
if (params.get('maxplayers')) document.getElementById('playerCount').textContent = '--/'+params.get('maxplayers');

// ── GMOD CALLBACKS ──
var curPct = 0;
function setPct(p) {
  if (p > curPct) {
    curPct = p;
    document.getElementById('pbar').style.width = p+'%';
    document.getElementById('pctTxt').textContent = p+'%';
  }
}
window.GameDetails = function(name,url,map,max) {
  // Name wird NICHT mehr ins Topbar geschrieben – bleibt immer "HOUSE OF CRAZY PEOPLE"
  if (map)  document.getElementById('mapDisp').textContent = map.replace('ttt_','').replace(/_/g,' ').toUpperCase();
  if (max)  document.getElementById('playerCount').textContent = '--/'+max;
  tryPlay();
};
var fbOn = true;
var sProg = {Retrieving:5,'Sending client':15,Parsing:20,Receiving:30,Checking:40,Loading:55,Requesting:60,Downloading:70,'Starting Lua':80,Settling:90,Done:100};
window.SetStatusChanged = function(s) {
  fbOn = false;
  document.getElementById('loadMsg').textContent = s.toUpperCase();
  document.getElementById('statusTxt').textContent = s.toUpperCase();
  for (var k in sProg) { if (s.indexOf(k)!==-1) { setPct(sProg[k]); break; } }
  tryPlay();
};
window.SetFilesNeeded = function(){};

// ── PING ──
setInterval(function(){ document.getElementById('pingDisp').textContent = 15+Math.floor(Math.random()*80); }, 2500);

// ── FALLBACK PROGRESS ──
var fbPct=0, fbMi=0;
var fbMsgs=['VERBINDE MIT SERVER...','SERVER INFO ABRUFEN...','MAP PRÜFEN...','RESSOURCEN LADEN...','LUA STARTEN...','FAST FERTIG...'];
var msgEl = document.getElementById('loadMsg');
var fbIv = setInterval(function(){
  if (!fbOn) { clearInterval(fbIv); return; }
  fbPct = Math.min(95, fbPct + 0.3 + Math.random()*1.2);
  if (fbPct > curPct) {
    document.getElementById('pbar').style.width = fbPct+'%';
    document.getElementById('pctTxt').textContent = Math.floor(fbPct)+'%';
  }
  var mi = Math.min(fbMsgs.length-1, Math.floor((fbPct/95)*(fbMsgs.length-1)));
  if (mi !== fbMi) { fbMi = mi; msgEl.textContent = fbMsgs[mi]; }
}, 100);

// ── TIPPS ──
var tips = [
  'Verrate niemanden... außer du bist der Traitor.',
  'Als Detective: Leichen untersuchen gibt wertvolle Hinweise!',
  'Innocent? Bleib in der Gruppe – Sicherheit in Zahlen.',
  'Traitor-Waffen kaufst du im Traitor Shop mit T-Punkten.',
  'Nicht jeder Verdächtige ist auch schuldig.',
  'Schieß nicht auf Unschuldige – das gibt Karma-Verlust!',
  'Der Detective kann mit DNA-Pistole Mörder identifizieren.',
  'Als Traitor: Vermeide es, allein mit dem Detective zu sein!'
];
var ti = 0, tipEl = document.getElementById('tipTxt');
function showTip() {
  tipEl.style.opacity = '0';
  setTimeout(function(){ tipEl.innerHTML='<span>'+tips[ti]+'</span>'; tipEl.style.opacity='1'; ti=(ti+1)%tips.length; }, 350);
}
showTip();
setInterval(showTip, 7000);

// ── VISUALISER BARS ──
var vBarsEl = document.getElementById('visBars');
var vBars = [];
for (var i=0; i<28; i++) {
  var b = document.createElement('div');
  b.className = 'vbar';
  b.style.height = '8%';
  vBarsEl.appendChild(b);
  vBars.push(b);
}

function animVis(playing) {
  for (var i=0; i<vBars.length; i++) {
    var base = i < 8 ? 0.6 : i < 16 ? 0.45 : i < 22 ? 0.3 : 0.2;
    var h = playing
      ? Math.max(5, (base * 0.4 + Math.random() * base) * 100)
      : (15 + Math.sin(Date.now()/800 + i*0.5) * 10);
    vBars[i].style.height = h + '%';
  }
}
setInterval(function(){ animVis(isPlaying); }, 85);

// ── MUSIK ──
// HINWEIS: AudioContext/GainNode funktioniert NICHT in GMod's CEF-Browser.
// Lautstärke wird pro Track direkt über aud.volume gesetzt (0.0 - 1.0).
// Werte anpassen falls ein Song zu laut/leise ist.
var aud = document.getElementById('aud');
var playlist = [], curTrk = 0, isPlaying = false;

playlist = [
  { name: "Cheri Cheri Lady",           artist: "Modern Talking",                file: "music/01_cheri.mp3",      vol: 0.20 },
  { name: "On My Own",                  artist: "Darci",                         file: "music/02_onmyown.mp3",    vol: 0.20 },
  { name: "The Hills x After Hours",    artist: "The Weeknd",                    file: "music/03_hills.mp3",      vol: 0.20 },
  { name: "Government Hooker (Remix)",  artist: "Lady Gaga",                     file: "music/04_hooker.mp3",     vol: 0.20 },
  { name: "Senorita",                   artist: "Shawn Mendes & Camila Cabello", file: "music/05_senorita.mp3",   vol: 0.20 },
  { name: "Animals (Slowed)",           artist: "Maroon 5",                      file: "music/06_animals.mp3",    vol: 0.20 },
  { name: "Agora Hills",                artist: "Doja Cat",                      file: "music/07_agorahills.mp3", vol: 0.20 }
];

loadTrk(Math.floor(Math.random() * playlist.length));
setTimeout(tryPlay, 2000);
setTimeout(tryPlay, 4000);

function loadTrk(idx) {
  var t = playlist[idx];
  if (!t) return;
  curTrk = idx;
  document.getElementById('trackName').textContent = t.name||'Unbekannt';
  document.getElementById('trackArtist').textContent = t.artist||'--';
  // Lautstärke direkt setzen – funktioniert zuverlässig in GMod CEF
  aud.volume = (t.vol !== undefined) ? t.vol : 0.20;
  if (t.file) {
    aud.src = t.file;
    aud.load();
    aud.onerror = function() {
      document.getElementById('trackArtist').textContent = 'FEHLER: ' + t.file;
    };
  }
}

function tryPlay() {
  if (isPlaying) return;
  var vol = playlist[curTrk] ? (playlist[curTrk].vol || 0.20) : 0.20;
  aud.volume = vol;
  aud.play().then(function(){
    isPlaying = true;
    aud.volume = vol;
  }).catch(function(){
    setTimeout(function(){ aud.play().then(function(){ isPlaying = true; }).catch(function(){}); }, 1000);
  });
}

// Lautstärke kontinuierlich durchsetzen (falls GMod sie zurücksetzt)
aud.addEventListener('volumechange', function(){
  var target = playlist[curTrk] ? (playlist[curTrk].vol || 0.20) : 0.20;
  if (aud.volume > target + 0.01) aud.volume = target;
});

aud.addEventListener('ended', function(){
  var next = (curTrk+1) % playlist.length;
  loadTrk(next);
  setTimeout(function(){ aud.play().catch(function(){}); }, 100);
});

setInterval(function(){
  if (!aud.duration) return;
  var pct = (aud.currentTime/aud.duration)*100;
  document.getElementById('musFill').style.width = pct+'%';
  document.getElementById('tNow').textContent = fmt(aud.currentTime);
  document.getElementById('tTot').textContent = fmt(aud.duration);
}, 500);

function fmt(s) { var m=Math.floor(s/60); return m+':'+('0'+Math.floor(s%60)).slice(-2); }
</script>
</body>
</html>
