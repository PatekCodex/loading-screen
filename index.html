<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>House of Crazy People – TTT</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --pink:#ff2d78; --purple:#b400ff; --cyan:#00f5ff; --yellow:#ffe600;
  --bg:#0a0010; --grid:#180028; --text:#f0c0ff; --dim:#6a3a8a;
}
body { background:var(--bg); color:var(--text); font-family:'Press Start 2P',monospace; height:100vh; overflow:hidden; display:grid; grid-template-rows:54px auto 1fr; }

.bg-wrap { position:fixed; inset:0; z-index:1; overflow:hidden; background:linear-gradient(180deg,#04000a 0%,#0c0018 30%,#160028 50%,#200035 62%,#0d001a 75%,#07000d 100%); }

/* Stars */
.bg-stars { position:absolute; inset:0; }
.star { position:absolute; background:#fff; border-radius:50%; animation:twinkle var(--d) ease-in-out infinite; animation-delay:var(--dl); }
@keyframes twinkle { 0%,100%{opacity:1;} 50%{opacity:0.05;} }

/* Sun */
.css-sun-wrap { position:absolute; left:50%; bottom:35%; transform:translateX(-50%); display:flex; flex-direction:column; align-items:center; }
.css-sun-title-top { font-family:'Press Start 2P',monospace; font-size:0.6rem; color:#00f5ff; text-shadow:0 0 20px #00f5ff,0 0 40px rgba(0,245,255,0.5); letter-spacing:0.15em; margin-bottom:5px; animation:flicker 7s ease-in-out infinite; }
.css-sun-title-bot { font-family:'Press Start 2P',monospace; font-size:0.8rem; color:#ffe600; text-shadow:0 0 20px #ffe600,0 0 40px rgba(255,230,0,0.5); letter-spacing:0.08em; margin-bottom:10px; animation:flicker 7s ease-in-out infinite 0.4s; }
@keyframes flicker { 0%,88%,100%{opacity:1;} 90%{opacity:0.3;} 92%{opacity:1;} 95%{opacity:0.5;} 97%{opacity:1;} }
.css-sun { width:180px; height:180px; border-radius:50%; background:linear-gradient(180deg,#fff5a0 0%,#ffe600 15%,#ff8c00 35%,#ff2d78 60%,#cc00dd 80%,#7700bb 100%); box-shadow:0 0 40px rgba(255,45,120,0.9),0 0 80px rgba(180,0,255,0.6),0 0 160px rgba(255,45,120,0.3); position:relative; overflow:hidden; animation:sunpulse 4s ease-in-out infinite; }
@keyframes sunpulse { 0%,100%{box-shadow:0 0 40px rgba(255,45,120,0.9),0 0 80px rgba(180,0,255,0.6);} 50%{box-shadow:0 0 60px rgba(255,45,120,1),0 0 120px rgba(180,0,255,0.9);} }
.css-sun::after { content:''; position:absolute; top:50%; left:0; right:0; bottom:0; background:repeating-linear-gradient(to bottom,#07000d 0,#07000d 4px,transparent 4px,transparent 11px,#07000d 11px,#07000d 14px,transparent 14px,transparent 22px,#07000d 22px,#07000d 24px,transparent 24px,transparent 30px); }

/* Mountains back */
.mtn-back { position:absolute; bottom:28%; left:0; right:0; height:180px; background:#0e001e; clip-path:polygon(0 100%,0 60%,3% 32%,7% 55%,11% 18%,15% 48%,20% 8%,25% 40%,29% 16%,34% 44%,39% 3%,44% 36%,48% 20%,53% 48%,57% 10%,62% 38%,66% 22%,71% 50%,76% 6%,81% 40%,85% 18%,89% 46%,93% 13%,97% 43%,100% 28%,100% 100%); filter:drop-shadow(0 -3px 8px rgba(180,0,255,0.6)); }
.mtn-back::after { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,transparent,rgba(180,0,255,0.9),var(--purple),rgba(180,0,255,0.9),transparent); box-shadow:0 0 12px var(--purple); }

/* Mountains front */
.mtn-front { position:absolute; bottom:22%; left:0; right:0; height:140px; background:#09000f; clip-path:polygon(0 100%,0 75%,4% 42%,8% 66%,13% 28%,18% 58%,23% 20%,28% 52%,33% 32%,38% 62%,43% 16%,48% 48%,52% 70%,57% 26%,62% 55%,67% 35%,72% 62%,77% 18%,82% 52%,87% 32%,91% 60%,95% 38%,100% 56%,100% 100%); filter:drop-shadow(0 -4px 8px rgba(255,45,120,0.6)); }
.mtn-front::after { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,transparent,rgba(255,45,120,0.9),var(--pink),rgba(255,45,120,0.9),transparent); box-shadow:0 0 14px var(--pink); }

/* Horizon glow */
.horizon { position:absolute; bottom:22%; left:0; right:0; height:3px; background:linear-gradient(90deg,transparent,var(--pink) 20%,var(--cyan) 50%,var(--pink) 80%,transparent); box-shadow:0 0 20px var(--pink),0 0 40px rgba(180,0,255,0.4); }

/* Ocean */
.ocean { position:absolute; bottom:0; left:0; right:0; height:22%; background:linear-gradient(180deg,#10001e 0%,#07000d 100%); overflow:hidden; }
.wave { position:absolute; left:-10%; right:-10%; height:2px; border-radius:50%; animation:waveaim linear infinite; }
.wave:nth-child(1){top:5%;background:linear-gradient(90deg,transparent,rgba(255,45,120,0.8),transparent);animation-duration:5s;}
.wave:nth-child(2){top:16%;background:linear-gradient(90deg,transparent,rgba(180,0,255,0.6),transparent);animation-duration:6.5s;animation-delay:0.8s;}
.wave:nth-child(3){top:28%;background:linear-gradient(90deg,transparent,rgba(0,245,255,0.5),transparent);animation-duration:7s;animation-delay:1.5s;}
.wave:nth-child(4){top:42%;background:linear-gradient(90deg,transparent,rgba(255,45,120,0.35),transparent);animation-duration:8.5s;animation-delay:0.3s;}
.wave:nth-child(5){top:58%;background:linear-gradient(90deg,transparent,rgba(180,0,255,0.3),transparent);animation-duration:10s;animation-delay:1.2s;}
.wave:nth-child(6){top:72%;background:linear-gradient(90deg,transparent,rgba(0,245,255,0.2),transparent);animation-duration:11s;animation-delay:2s;}
.wave:nth-child(7){top:86%;background:linear-gradient(90deg,transparent,rgba(255,45,120,0.15),transparent);animation-duration:13s;animation-delay:0.6s;}
@keyframes waveaim { 0%{transform:translateX(-5%) scaleY(1);opacity:0;} 10%{opacity:1;} 50%{transform:translateX(5%) scaleY(2);opacity:0.8;} 90%{opacity:1;} 100%{transform:translateX(-5%) scaleY(1);opacity:0;} }

/* Sun reflection on ocean */
.sun-refl { position:absolute; bottom:22%; left:50%; transform:translateX(-50%); width:6px; height:22%; background:linear-gradient(to bottom,rgba(255,45,120,0.5),transparent); animation:reflshimmer 3s ease-in-out infinite; }
@keyframes reflshimmer { 0%,100%{width:6px;opacity:0.5;} 50%{width:16px;opacity:0.8;} }
.scanlines { position:fixed; inset:0; z-index:202; pointer-events:none; background:repeating-linear-gradient(to bottom,transparent 0,transparent 3px,rgba(0,0,0,0.18) 3px,rgba(0,0,0,0.18) 4px); }
.crt-edge { position:fixed; inset:0; z-index:203; pointer-events:none; box-shadow:inset 0 0 80px rgba(180,0,255,0.12),inset 0 0 30px rgba(0,245,255,0.06); }

/* TOPBAR */
.topbar { position:relative; z-index:210; display:flex; align-items:center; justify-content:space-between; padding:0 20px; height:54px; background:rgba(10,0,16,0.97); border-bottom:2px solid var(--purple); box-shadow:0 0 20px rgba(180,0,255,0.4),0 3px 0 var(--pink); }
.tb-left { display:flex; align-items:center; gap:10px; }
.tb-logo { width:36px; height:36px; object-fit:cover; border:2px solid var(--pink); box-shadow:0 0 8px var(--pink); }
.tb-name { font-size:0.65rem; color:var(--cyan); text-shadow:0 0 10px var(--cyan),2px 2px 0 var(--purple); letter-spacing:0.05em; }
.tb-right { font-family:'VT323',monospace; font-size:1rem; color:var(--pink); text-shadow:0 0 8px var(--pink); animation:blink 1s step-end infinite; display:flex; align-items:center; gap:6px; }
@keyframes blink { 50%{opacity:0.3;} }

/* LADEBALKEN */
.loader { position:relative; z-index:210; background:rgba(10,0,16,0.98); border-bottom:2px solid var(--pink); box-shadow:0 4px 20px rgba(255,45,120,0.3); padding:6px 18px 8px; }
.loader-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:5px; }
.loader-msg { font-size:0.35rem; letter-spacing:0.1em; color:var(--cyan); text-shadow:0 0 8px var(--cyan); }
.loader-pct { font-family:'VT323',monospace; font-size:1.2rem; color:var(--pink); text-shadow:0 0 10px var(--pink); }
.loader-track { width:100%; height:8px; background:var(--grid); border:1px solid var(--purple); position:relative; overflow:hidden; }
.loader-bar { height:100%; width:0%; background:repeating-linear-gradient(90deg,var(--pink) 0,var(--pink) 6px,var(--purple) 6px,var(--purple) 12px); box-shadow:0 0 12px var(--pink); transition:width 0.3s steps(8); position:relative; }
.loader-bar::after { content:''; position:absolute; right:0; top:0; bottom:0; width:3px; background:#fff; animation:cur 0.5s step-end infinite; }
@keyframes cur { 50%{opacity:0;} }

/* MAIN */
.main { position:relative; z-index:5; background:transparent; display:grid; grid-template-columns:1fr 260px; flex:1; overflow:hidden; min-height:0; }

/* LEFT */
.left { display:grid; grid-template-rows:1fr auto; overflow:hidden; background:transparent; }
.map-preview { position:relative; overflow:hidden; display:flex; align-items:center; justify-content:center; background:transparent; }
.preview-tip-box { position:absolute; bottom:44px; left:12px; right:12px; background:rgba(10,0,16,0.82); border:1px solid var(--purple); box-shadow:0 0 12px rgba(180,0,255,0.3); padding:6px 12px; z-index:3; }
.preview-tip-label { font-size:0.35rem; letter-spacing:0.15em; color:var(--cyan); text-shadow:0 0 8px var(--cyan); margin-bottom:4px; }
.tip-text { font-family:"VT323",monospace; font-size:0.85rem; color:var(--text); opacity:0.8; line-height:1.4; transition:opacity 0.4s; }
.tip-text span { color:var(--yellow); }
.map-label { position:absolute; bottom:12px; left:16px; font-family:'VT323',monospace; font-size:1.3rem; color:var(--cyan); text-shadow:0 0 12px var(--cyan); z-index:2; background:rgba(10,0,16,0.7); padding:2px 10px; border:1px solid var(--cyan); }
.left-bottom { padding:10px 16px; background:rgba(10,0,16,0.9); border-top:2px solid var(--grid); display:grid; grid-template-columns:1fr 1fr 1fr auto; gap:10px; align-items:center; }
.mini-stat { border:1px solid var(--purple); padding:6px 10px; background:rgba(180,0,255,0.05); box-shadow:inset 0 0 8px rgba(180,0,255,0.1); }
.mini-stat-val { font-family:'VT323',monospace; font-size:1.2rem; color:var(--pink); text-shadow:0 0 8px var(--pink); line-height:1; }
.mini-stat-key { font-size:0.3rem; letter-spacing:0.12em; color:var(--dim); text-transform:uppercase; margin-top:2px; }
.mascot-wrap { display:flex; align-items:flex-end; justify-content:center; }
.mascot { height:60px; image-rendering:pixelated; filter:drop-shadow(0 0 10px var(--pink)); animation:mascotBob 2s ease-in-out infinite; }
@keyframes mascotBob { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-6px);} }

/* RIGHT */
.right { border-left:2px solid var(--purple); box-shadow:-6px 0 20px rgba(180,0,255,0.2); background:rgba(10,0,16,0.88); display:flex; flex-direction:column; overflow:hidden; }
.r-section { border-bottom:1px solid var(--grid); flex-shrink:0; }
.r-title { font-size:0.38rem; letter-spacing:0.18em; color:var(--cyan); text-shadow:0 0 8px var(--cyan); padding:8px 14px 0; display:flex; align-items:center; gap:5px; }
.r-title::before { content:'▶'; font-size:0.4rem; }
.music-player { padding:8px 14px 10px; }
.music-track-name { font-family:'VT323',monospace; font-size:0.95rem; color:var(--yellow); text-shadow:0 0 8px var(--yellow); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:4px; }
.music-artist { font-family:'VT323',monospace; font-size:0.75rem; color:var(--dim); margin-bottom:8px; }
.music-progress-track { height:3px; background:var(--grid); border:1px solid var(--dim); }
.music-progress-fill { height:100%; width:0%; background:linear-gradient(90deg,var(--purple),var(--pink)); box-shadow:0 0 6px var(--pink); transition:width 1s linear; }
.music-time { display:flex; justify-content:space-between; font-family:'VT323',monospace; font-size:0.65rem; color:var(--dim); margin-top:2px; }
.vis-section { flex-shrink:0; border-bottom:1px solid var(--grid); }
.vis-section canvas { display:block; width:100%; height:70px; }
.players-section { flex:1; display:flex; flex-direction:column; min-height:0; }
.players-list { flex:1; overflow-y:auto; }
.players-list::-webkit-scrollbar { width:3px; }
.players-list::-webkit-scrollbar-thumb { background:var(--purple); }
.p-row { display:flex; align-items:center; gap:8px; padding:5px 14px; border-bottom:1px solid rgba(180,0,255,0.07); }
.p-dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; background:var(--purple); box-shadow:0 0 5px var(--purple); }
.p-name { font-family:'VT323',monospace; font-size:0.85rem; color:var(--text); flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.p-empty { padding:12px 14px; font-family:'VT323',monospace; font-size:0.8rem; color:var(--dim); line-height:2; }
</style>
</head>
<body>

<div class="bg-wrap">
  <div class="bg-stars" id="stars"></div>
  <div class="css-sun-wrap">
    <span class="css-sun-title-top">HOUSE OF</span>
    <span class="css-sun-title-bot">CRAZY PEOPLE</span>
    <div class="css-sun"></div>
  </div>
  <div class="mtn-back"></div>
  <div class="mtn-front"></div>
  <div class="horizon"></div>
  <div class="sun-refl"></div>
  <div class="ocean">
    <div class="wave"></div><div class="wave"></div><div class="wave"></div>
    <div class="wave"></div><div class="wave"></div><div class="wave"></div>
    <div class="wave"></div>
  </div>
</div>
<div class="scanlines"></div>
<div class="crt-edge"></div>

<div class="topbar">
  <div class="tb-left">
    <img class="tb-logo" src="p.png" alt="Logo">
    <div class="tb-name" id="serverNameDisp">HOUSE OF CRAZY PEOPLE</div>
  </div>
  <div class="tb-right"><span>●</span><span id="statusPill">CONNECTING...</span></div>
</div>

<div class="loader">
  <div class="loader-top">
    <div class="loader-msg" id="loadMsg">VERBINDE MIT SERVER...</div>
    <div class="loader-pct" id="pctTxt">0%</div>
  </div>
  <div class="loader-track"><div class="loader-bar" id="pbar"></div></div>
</div>

<div class="main">
  <div class="left">
    <div class="map-preview">
      <div class="preview-tip-box">
        <div class="preview-tip-label">▶ TIPP</div>
        <div class="tip-text" id="tipText">&gt; <span>Lade Tipps...</span></div>
      </div>
      <div class="map-label">MAP: <span id="mapDisp">--</span></div>
    </div>
    <div class="left-bottom">
      <div class="mini-stat"><div class="mini-stat-val" id="playerCount">--/32</div><div class="mini-stat-key">Spieler</div></div>
      <div class="mini-stat"><div class="mini-stat-val">TTT</div><div class="mini-stat-key">Modus</div></div>
      <div class="mini-stat"><div class="mini-stat-val" id="pingDisp">--</div><div class="mini-stat-key">Ping ms</div></div>
      <div class="mascot-wrap"><img class="mascot" src="p.png" alt="mascot"></div>
    </div>
  </div>

  <div class="right">
    <div class="r-section">
      <div class="r-title">NOW PLAYING</div>
      <div class="music-player">
        <div class="music-track-name" id="trackName">Lade Musik...</div>
        <div class="music-artist" id="trackArtist">--</div>
        <div class="music-progress-track"><div class="music-progress-fill" id="musicProgress"></div></div>
        <div class="music-time"><span id="timeNow">0:00</span><span id="timeTotal">0:00</span></div>
      </div>
    </div>
    <div class="vis-section r-section">
      <div class="r-title">VISUALISER</div>
      <canvas id="visualiserCanvas"></canvas>
    </div>
    <div class="players-section">
      <div class="r-title" style="padding-bottom:4px;">SPIELER ONLINE</div>
      <div class="players-list" id="playerList">
        <div class="p-empty">&gt; Warte auf<br>&gt; Serverdaten...<br>&gt; _</div>
      </div>
    </div>
  </div>
</div>

<audio id="audioPlayer" preload="auto"></audio>

<script>
// Canvas replaced with CSS

// STARS
var starsEl=document.getElementById('stars');
for(var si=0;si<80;si++){
  var s=document.createElement('div');s.className='star';
  var sz=si<60?2:si<75?1:3;
  s.style.width=sz+'px';s.style.height=sz+'px';
  s.style.left=Math.random()*100+'%';s.style.top=Math.random()*65+'%';
  s.style.setProperty('--d',(1.5+Math.random()*3.5)+'s');
  s.style.setProperty('--dl',Math.random()*3+'s');
  s.style.opacity=0.3+Math.random()*0.7;
  starsEl.appendChild(s);
}

// ═══════════════════════════════════════
// GMOD CALLBACKS – laut facepunch.com/gmod/Loading_URL
// sv_loadingurl "https://patekcodex.github.io/loading-screen/?Map=%m&maxplayers=32"
// ═══════════════════════════════════════
var currentPct=0;
function setProgress(p){if(p>currentPct){currentPct=p;document.getElementById('pbar').style.width=p+'%';document.getElementById('pctTxt').textContent=p+'%';}}

// Alle Parameter laut Wiki: servername, serverurl, mapname, maxplayers, steamid, gamemode, volume, language
window.GameDetails=function(servername,serverurl,mapname,maxplayers,steamid,gamemode,volume,language){
  if(servername)document.getElementById('serverNameDisp').textContent=servername.toUpperCase();
  if(mapname)document.getElementById('mapDisp').textContent=mapname.replace('ttt_','').replace(/_/g,' ').toUpperCase();
  if(maxplayers)document.getElementById('playerCount').textContent='--/'+maxplayers;
  tryPlay(); // Musik starten sobald GMod den Callback auslöst
};
window.SetFilesTotal=function(total){};
window.DownloadingFile=function(fileName){document.getElementById('loadMsg').textContent=('DL: '+fileName).toUpperCase().substring(0,55);};
window.SetFilesNeeded=function(needed){};

var fallbackOn=true;
var sProg={'Retrieving':5,'Sending client':15,'Parsing':20,'Receiving':30,'Checking':40,'Loading':55,'Requesting':60,'Downloading':70,'Starting Lua':80,'Settling':90,'Done':100};
window.SetStatusChanged=function(status){
  fallbackOn=false;
  document.getElementById('loadMsg').textContent=status.toUpperCase();
  document.getElementById('statusPill').textContent=status.toUpperCase();
  for(var k in sProg){if(status.indexOf(k)!==-1){setProgress(sProg[k]);break;}}
  tryPlay();
};

// URL Params (%m=map, %s=steamid laut Wiki)
var params=new URLSearchParams(window.location.search);
var mapParam=params.get('Map')||params.get('map');
if(mapParam)document.getElementById('mapDisp').textContent=mapParam.replace('ttt_','').replace(/_/g,' ').toUpperCase();
if(params.get('maxplayers'))document.getElementById('playerCount').textContent='--/'+params.get('maxplayers');

// PING
setInterval(function(){document.getElementById('pingDisp').textContent=15+Math.floor(Math.random()*80);},2500);

// FALLBACK PROGRESS
var fbPct=0,fbMi=0;
var fbMsgs=['VERBINDE MIT SERVER...','SERVER INFO ABRUFEN...','MAP PRÜFEN...','RESSOURCEN LADEN...','LUA STARTEN...','FAST FERTIG...'];
var fbIv=setInterval(function(){
  if(!fallbackOn){clearInterval(fbIv);return;}
  fbPct=Math.min(95,fbPct+0.3+Math.random()*1.2);
  if(fbPct>currentPct){document.getElementById('pbar').style.width=fbPct+'%';document.getElementById('pctTxt').textContent=Math.floor(fbPct)+'%';}
  var mi=Math.min(fbMsgs.length-1,Math.floor((fbPct/95)*(fbMsgs.length-1)));
  if(mi!==fbMi){fbMi=mi;document.getElementById('loadMsg').textContent=fbMsgs[mi];}
},100);

// TIPPS
var tips=['Verrate niemanden... außer du bist der Traitor.','Als Detective: Leichen untersuchen gibt wertvolle Hinweise!','Innocent? Bleib in der Gruppe – Sicherheit in Zahlen.','Traitor-Waffen kaufst du im Traitor Shop mit T-Punkten.','Nicht jeder Verdächtige ist auch schuldig.','Schieß nicht auf Unschuldige – das gibt Karma-Verlust!','Der Detective kann mit DNA-Pistole Mörder identifizieren.','Als Traitor: Vermeide es, allein mit dem Detective zu sein!'];
var tipI=0,tipEl=document.getElementById('tipText');
function showTip(){tipEl.style.opacity='0';setTimeout(function(){tipEl.innerHTML='&gt; <span>'+tips[tipI]+'</span>';tipEl.style.opacity='1';tipI=(tipI+1)%tips.length;},300);}
showTip();setInterval(showTip,7000);

// ═══════════════════════════════════════
// MUSIK – Hardcoded, kein fetch()
// Dateien müssen im music/ Ordner mit diesen Namen sein
// ═══════════════════════════════════════
var audio=document.getElementById('audioPlayer');
var playlist=[
  {name:"Cheri Cheri Lady",         artist:"Modern Talking",                file:"music/01_cheri.mp3"},
  {name:"On My Own",                artist:"Darci",                         file:"music/02_onmyown.mp3"},
  {name:"The Hills x After Hours",  artist:"The Weeknd",                    file:"music/03_hills.mp3"},
  {name:"Government Hooker (Remix)",artist:"Lady Gaga",                     file:"music/04_hooker.mp3"},
  {name:"Senorita",                 artist:"Shawn Mendes & Camila Cabello",  file:"music/05_senorita.mp3"},
  {name:"Animals (Slowed)",         artist:"Maroon 5",                      file:"music/06_animals.mp3"},
  {name:"Agora Hills",              artist:"Doja Cat",                      file:"music/07_agorahills.mp3"}
];
var curTrk=0,isPlaying=false;
audio.volume=0.4;

// Zufälliger Start-Track
loadTrack(Math.floor(Math.random()*playlist.length));
// Mehrere Versuche – GMod blockiert Autoplay manchmal kurz
setTimeout(tryPlay,300);
setTimeout(tryPlay,1000);
setTimeout(tryPlay,2500);

function loadTrack(idx){
  var tr=playlist[idx];if(!tr)return;
  curTrk=idx;
  document.getElementById('trackName').textContent=tr.name||'Unbekannt';
  document.getElementById('trackArtist').textContent=tr.artist||'--';
  if(tr.file){audio.src=tr.file;audio.load();}
}
function tryPlay(){
  if(isPlaying)return;
  audio.play().then(function(){isPlaying=true;}).catch(function(){});
}
audio.addEventListener('ended',function(){loadTrack((curTrk+1)%playlist.length);setTimeout(function(){audio.play().catch(function(){});},100);});
audio.addEventListener('error',function(){document.getElementById('trackArtist').textContent='FEHLER: Datei nicht gefunden!';});

// Progress
setInterval(function(){
  if(!audio.duration)return;
  document.getElementById('musicProgress').style.width=(audio.currentTime/audio.duration*100)+'%';
  document.getElementById('timeNow').textContent=fmt(audio.currentTime);
  document.getElementById('timeTotal').textContent=fmt(audio.duration);
},500);
function fmt(s){return Math.floor(s/60)+':'+('0'+Math.floor(s%60)).slice(-2);}

// ═══════════════════════════════════════
// VISUALISER
// ═══════════════════════════════════════
var vc=document.getElementById('visualiserCanvas'),vx=vc.getContext('2d');
var actx,analyser,darr,aconn=false;
audio.addEventListener('play',function(){
  if(aconn)return;
  try{actx=new(window.AudioContext||window.webkitAudioContext)();analyser=actx.createAnalyser();analyser.fftSize=128;darr=new Uint8Array(analyser.frequencyBinCount);var src=actx.createMediaElementSource(audio);src.connect(analyser);analyser.connect(actx.destination);aconn=true;}catch(e){}
});
function drawVis(){
  var W=vc.offsetWidth,H=vc.offsetHeight||70;
  if(vc.width!==W)vc.width=W;vc.height=H;
  vx.clearRect(0,0,W,H);vx.fillStyle='rgba(10,0,16,0.85)';vx.fillRect(0,0,W,H);
  var bars=32,bw=W/bars,now=Date.now()/1000;
  if(aconn&&isPlaying){
    analyser.getByteFrequencyData(darr);
    for(var i=0;i<bars;i++){var v=darr[Math.floor(i*darr.length/bars)]/255,h=Math.max(2,v*H*0.95),x=i*bw,g=vx.createLinearGradient(0,H,0,H-h);g.addColorStop(0,'rgba(180,0,255,0.9)');g.addColorStop(1,'rgba(255,45,120,0.9)');vx.fillStyle=g;vx.fillRect(x+1,H-h,bw-2,h);vx.fillStyle='rgba(255,255,255,'+(v*0.9)+')';vx.fillRect(x+1,H-h-2,bw-2,2);}
  }else{
    for(var i=0;i<bars;i++){var h=(Math.sin(now*2+i*0.4)*0.3+0.35)*H*0.4;vx.fillStyle='rgba(180,0,255,0.3)';vx.fillRect(i*bw+1,H/2-h/2,bw-2,h);}
  }
}
// GMod Fallback für Visualiser
if(typeof requestAnimationFrame !== 'undefined') {
  function rafVis(){drawVis();requestAnimationFrame(rafVis);}
  requestAnimationFrame(rafVis);
}
setInterval(drawVis, 50);
</script>
