<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>House of Crazy People – TTT</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --pink:   #ff2d78;
  --purple: #b400ff;
  --cyan:   #00f5ff;
  --yellow: #ffe600;
  --green:  #00ff88;
  --bg:     #07000d;
  --bg2:    #0d0018;
  --dim:    #4a2060;
  --text:   #d8a0f8;
}
html, body { width: 100%; height: 100%; overflow: hidden; }
body {
  background: #07000d;
  color: var(--text);
  font-family: 'Press Start 2P', monospace;
  display: flex;
  flex-direction: column;
}
#bgCanvas { position: fixed; inset: 0; z-index: 0; width: 100%; height: 100%; }
#sunLabel {
  position: fixed; left: 50%; transform: translateX(-50%);
  top: 12%; z-index: 10; text-align: center; pointer-events: none;
  animation: labelFlicker 8s ease-in-out infinite;
}
@keyframes labelFlicker { 0%,88%,100%{opacity:1;} 90%{opacity:0.3;} 92%{opacity:1;} 95%{opacity:0.5;} 97%{opacity:1;} }
#sunLabel .top { display:block; font-size:1.1rem; letter-spacing:0.18em; color:#00f5ff; text-shadow:0 0 24px #00f5ff,0 0 50px rgba(0,245,255,0.6); margin-bottom:10px; }
#sunLabel .bot { display:block; font-size:2.2rem; letter-spacing:0.1em; color:#ffe600; text-shadow:0 0 30px #ffe600,0 0 60px rgba(255,230,0,0.7),4px 4px 0 rgba(180,0,255,0.7); white-space:nowrap; }
.scanlines { position:fixed; inset:0; z-index:100; pointer-events:none; background:repeating-linear-gradient(to bottom,transparent 0,transparent 2px,rgba(0,0,0,0.12) 2px,rgba(0,0,0,0.12) 4px); }
.topbar { position:relative; z-index:200; display:flex; align-items:center; justify-content:space-between; height:54px; padding:0 20px; background:rgba(7,0,13,0.96); border-bottom:2px solid var(--purple); box-shadow:0 0 24px rgba(180,0,255,0.4),0 3px 0 var(--pink); flex-shrink:0; }
.tb-left { display:flex; align-items:center; gap:12px; }
.tb-logo { width:36px; height:36px; object-fit:cover; border:2px solid var(--pink); box-shadow:0 0 10px var(--pink); }
.tb-name { font-size:0.65rem; color:var(--cyan); text-shadow:0 0 12px var(--cyan),2px 2px 0 rgba(180,0,255,0.5); letter-spacing:0.06em; }
.tb-status { font-family:'VT323',monospace; font-size:1rem; color:var(--pink); text-shadow:0 0 10px var(--pink); display:flex; align-items:center; gap:6px; animation:blink 1.2s step-end infinite; }
.tb-dot { width:8px; height:8px; border-radius:50%; background:var(--pink); box-shadow:0 0 8px var(--pink); }
@keyframes blink { 50%{opacity:0.25;} }
.loader { position:relative; z-index:200; flex-shrink:0; background:rgba(7,0,13,0.98); border-bottom:2px solid rgba(180,0,255,0.4); padding:6px 20px 8px; box-shadow:0 4px 20px rgba(255,45,120,0.2); }
.loader-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:5px; }
.loader-msg { font-size:0.35rem; letter-spacing:0.12em; color:var(--cyan); text-shadow:0 0 8px var(--cyan); }
.loader-pct { font-family:'VT323',monospace; font-size:1.3rem; color:var(--pink); text-shadow:0 0 12px var(--pink); }
.loader-track { width:100%; height:10px; background:rgba(180,0,255,0.1); border:1px solid rgba(180,0,255,0.4); border-radius:1px; overflow:hidden; position:relative; }
.loader-bar { height:100%; width:0%; background:repeating-linear-gradient(90deg,var(--pink) 0,var(--pink) 8px,var(--purple) 8px,var(--purple) 16px); box-shadow:0 0 16px var(--pink); transition:width 0.3s ease; position:relative; }
.loader-bar::after { content:''; position:absolute; right:0; top:0; bottom:0; width:3px; background:#fff; box-shadow:0 0 8px #fff; animation:cur 0.5s step-end infinite; }
@keyframes cur { 50%{opacity:0;} }
.main { flex:1; display:grid; grid-template-columns:1fr 270px; position:relative; z-index:150; overflow:hidden; min-height:0; }
.left { position:relative; display:flex; flex-direction:column; justify-content:flex-end; }
.info-row { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; padding:10px 16px; background:rgba(7,0,13,0.88); border-top:1px solid rgba(180,0,255,0.25); backdrop-filter:blur(4px); }
.info-box { background:rgba(180,0,255,0.05); border:1px solid rgba(180,0,255,0.35); padding:8px 10px; position:relative; overflow:hidden; }
.info-box::before { content:''; position:absolute; top:0; left:0; right:0; height:1px; background:linear-gradient(90deg,transparent,var(--purple),transparent); }
.info-val { font-family:'VT323',monospace; font-size:1.3rem; color:var(--pink); text-shadow:0 0 10px var(--pink); line-height:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.info-key { font-size:0.28rem; letter-spacing:0.15em; color:var(--dim); text-transform:uppercase; margin-top:3px; }
.tip-area { padding:8px 16px; background:rgba(7,0,13,0.82); border-top:1px solid rgba(180,0,255,0.15); }
.tip-lbl { font-size:0.32rem; letter-spacing:0.15em; color:var(--cyan); margin-bottom:4px; }
.tip-txt { font-family:'VT323',monospace; font-size:0.9rem; color:rgba(220,170,255,0.85); line-height:1.4; transition:opacity 0.4s; }
.tip-txt span { color:var(--yellow); }
.right { border-left:2px solid rgba(180,0,255,0.5); box-shadow:-8px 0 30px rgba(180,0,255,0.15); background:rgba(7,0,13,0.92); display:flex; flex-direction:column; overflow:hidden; backdrop-filter:blur(4px); }
.panel-hdr { font-size:0.36rem; letter-spacing:0.18em; color:var(--cyan); text-shadow:0 0 8px var(--cyan); padding:8px 14px 5px; display:flex; align-items:center; gap:5px; flex-shrink:0; border-bottom:1px solid rgba(180,0,255,0.15); }
.panel-hdr::before { content:'▶'; font-size:0.38rem; color:var(--pink); }
.music-block { padding:8px 14px 10px; flex-shrink:0; }
.now-track { font-family:'VT323',monospace; font-size:1rem; color:var(--yellow); text-shadow:0 0 10px var(--yellow); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:2px; }
.now-artist { font-family:'VT323',monospace; font-size:0.78rem; color:var(--dim); margin-bottom:8px; }
.mus-prog { height:3px; background:rgba(180,0,255,0.2); border:1px solid rgba(180,0,255,0.3); cursor:pointer; margin-bottom:3px; }
.mus-prog-fill { height:100%; width:0%; background:linear-gradient(90deg,var(--purple),var(--pink)); box-shadow:0 0 6px var(--pink); transition:width 1s linear; }
.mus-time { display:flex; justify-content:space-between; font-family:'VT323',monospace; font-size:0.62rem; color:var(--dim); }
.vis-block { padding:4px 14px 8px; flex-shrink:0; }
.vis-bars { display:flex; align-items:flex-end; gap:2px; height:55px; background:rgba(0,0,0,0.4); border:1px solid rgba(180,0,255,0.2); border-radius:1px; padding:3px; overflow:hidden; }
.vbar { flex:1; min-height:2px; border-radius:1px 1px 0 0; background:linear-gradient(to top,var(--purple),var(--pink),#fff); box-shadow:0 0 4px var(--pink); transition:height 0.08s ease; }
.team-block { flex:1; display:flex; flex-direction:column; min-height:0; }
.team-scroll { flex:1; overflow-y:auto; padding:4px 0; }
.team-scroll::-webkit-scrollbar { width:3px; }
.team-scroll::-webkit-scrollbar-thumb { background:var(--purple); }
.tm-row { display:flex; align-items:center; gap:9px; padding:6px 10px; border-bottom:1px solid rgba(180,0,255,0.08); position:relative; }
.tm-row:hover { background:rgba(180,0,255,0.05); }
.tm-avatar { width:36px; height:36px; border-radius:2px; flex-shrink:0; border:1px solid rgba(180,0,255,0.5); background:rgba(180,0,255,0.15); display:flex; align-items:center; justify-content:center; overflow:hidden; position:relative; }
.tm-avatar img { width:100%; height:100%; object-fit:cover; display:block; }
.tm-avatar-init { font-family:'VT323',monospace; font-size:1.3rem; line-height:1; }
.tm-info { flex:1; min-width:0; }
.tm-name { font-family:'VT323',monospace; font-size:1rem; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; line-height:1.2; }
.tm-rank { font-family:'VT323',monospace; font-size:0.9rem; letter-spacing:0.12em; text-transform:uppercase; padding:1px 8px; border-radius:2px; margin-top:3px; display:inline-block; text-shadow:0 0 10px currentColor; line-height:1.4; }
.team-add-btn { margin:5px 10px 4px; padding:6px; font-family:'Press Start 2P',monospace; font-size:0.28rem; letter-spacing:0.1em; color:var(--cyan); background:rgba(0,245,255,0.05); border:1px solid rgba(0,245,255,0.25); cursor:pointer; text-align:center; flex-shrink:0; transition:background 0.2s,border-color 0.2s; }
.team-add-btn:hover { background:rgba(0,245,255,0.12); border-color:var(--cyan); }
.team-form { padding:8px 10px; flex-shrink:0; background:rgba(0,0,0,0.4); border-top:1px solid rgba(180,0,255,0.2); display:none; flex-direction:column; gap:4px; }
.team-form.open { display:flex; }
.tf-row { display:flex; gap:5px; align-items:flex-end; }
.tf-lbl { font-size:0.22rem; letter-spacing:0.1em; color:var(--dim); margin-bottom:1px; margin-top:2px; }
.tf-inp { flex:1; background:rgba(0,0,0,0.6); border:1px solid rgba(180,0,255,0.3); color:var(--text); font-family:'VT323',monospace; font-size:0.9rem; padding:3px 7px; min-width:0; outline:none; }
.tf-inp:focus { border-color:var(--cyan); box-shadow:0 0 5px rgba(0,245,255,0.25); }
.tf-inp::placeholder { color:var(--dim); }
.tf-sel { background:rgba(0,0,0,0.6); border:1px solid rgba(180,0,255,0.3); color:var(--text); font-family:'VT323',monospace; font-size:0.9rem; padding:3px 5px; outline:none; flex-shrink:0; }
.tf-hint { font-family:'VT323',monospace; font-size:0.65rem; color:var(--dim); margin-top:1px; }
.tf-btns { display:flex; gap:5px; margin-top:3px; }
.tf-save { flex:1; padding:5px; font-family:'Press Start 2P',monospace; font-size:0.25rem; letter-spacing:0.08em; background:rgba(255,45,120,0.12); border:1px solid var(--pink); color:var(--pink); cursor:pointer; transition:background 0.2s; }
.tf-save:hover { background:rgba(255,45,120,0.28); }
.tf-cancel { padding:5px 8px; font-family:'Press Start 2P',monospace; font-size:0.25rem; background:transparent; border:1px solid rgba(180,0,255,0.3); color:var(--dim); cursor:pointer; }
.tf-cancel:hover { border-color:var(--purple); color:var(--text); }
.p-empty { padding:12px 14px; font-family:'VT323',monospace; font-size:0.8rem; color:var(--dim); line-height:2; }
</style>
</head>
<body>

<canvas id="bgCanvas"></canvas>
<div id="sunLabel"><span class="top">HOUSE OF</span><span class="bot">CRAZY PEOPLE</span></div>
<div class="scanlines"></div>

<div class="topbar">
  <div class="tb-left">
    <img class="tb-logo" src="p.png" alt="">
    <span class="tb-name">HOUSE OF CRAZY PEOPLE</span>
  </div>
  <div class="tb-status"><div class="tb-dot"></div><span id="statusTxt">CONNECTING...</span></div>
</div>

<div class="loader">
  <div class="loader-top">
    <div class="loader-msg" id="loadMsg">VERBINDE MIT SERVER...</div>
    <div class="loader-pct" id="pctTxt">0%</div>
  </div>
  <div class="loader-track"><div class="loader-bar" id="pbar"></div></div>
</div>

<div class="main">
  <div class="left">
    <div class="tip-area">
      <div class="tip-lbl">▶ TIPP</div>
      <div class="tip-txt" id="tipTxt"><span>Lade Tipps...</span></div>
    </div>
    <div class="info-row">
      <div class="info-box"><div class="info-val" id="playerCount">--/32</div><div class="info-key">Spieler</div></div>
      <div class="info-box"><div class="info-val" id="mapDisp" style="font-size:0.85rem;">--</div><div class="info-key">Map</div></div>
      <div class="info-box"><div class="info-val">TTT</div><div class="info-key">Modus</div></div>
      <div class="info-box"><div class="info-val" id="pingDisp">--</div><div class="info-key">Ping ms</div></div>
    </div>
  </div>
  <div class="right">
    <div class="panel-hdr">NOW PLAYING</div>
    <div class="music-block">
      <div class="now-track" id="trackName">Lade Musik...</div>
      <div class="now-artist" id="trackArtist">--</div>
      <div class="mus-prog"><div class="mus-prog-fill" id="musFill"></div></div>
      <div class="mus-time"><span id="tNow">0:00</span><span id="tTot">0:00</span></div>
    </div>
    <div class="panel-hdr">VISUALISER</div>
    <div class="vis-block"><div class="vis-bars" id="visBars"></div></div>
    <div class="panel-hdr">TEAM</div>
    <div class="team-block">
      <div class="team-scroll" id="teamList"></div>
      <button class="team-add-btn" onclick="toggleTeamForm()">+ MITGLIED HINZUFÜGEN</button>
      <div class="team-form" id="teamForm">
        <div class="tf-lbl">STEAM ID</div>
        <input class="tf-inp" id="tf-sid" placeholder="STEAM_0:1:XXXXXXXX oder 7656119…" maxlength="25">
        <div class="tf-hint">Name &amp; Avatar werden automatisch geladen</div>
        <div class="tf-lbl">RANG</div>
        <div class="tf-row">
          <input class="tf-inp" id="tf-rank" placeholder="z.B. Server-Owner" maxlength="20">
          <select class="tf-sel" id="tf-color">
            <option value="#9400ff">Server-Owner (Lila)</option>
            <option value="#8b0000">Head-Mod (Dunkelrot)</option>
            <option value="#0077ff">Admin (Blau)</option>
            <option value="#cc1100">Moderator (Rot)</option>
            <option value="#ffe600">Trainee-Mod (Gelb)</option>
          </select>
        </div>
        <div class="tf-btns">
          <button class="tf-save" onclick="saveTeamMember()">SPEICHERN</button>
          <button class="tf-cancel" onclick="toggleTeamForm()">ABBRUCH</button>
        </div>
      </div>
    </div>
  </div>
</div>

<audio id="aud" preload="auto"></audio>

<script>
// ═══════════════════════════════════════════════
//  CANVAS BACKGROUND
// ═══════════════════════════════════════════════
var canvas=document.getElementById('bgCanvas'),ctx=canvas.getContext('2d'),W,H,tick=0,stars=[],shooters=[];
function initStars(){stars=[];for(var i=0;i<120;i++)stars.push({x:Math.random()*W,y:Math.random()*H*0.65,r:Math.random()*1.5+0.3,phase:Math.random()*Math.PI*2,speed:0.5+Math.random()*1.5});}
function spawnShooter(){if(Math.random()<0.008)shooters.push({x:Math.random()*W*0.8,y:Math.random()*H*0.3,len:80+Math.random()*120,alpha:1,speed:6+Math.random()*6});}
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;initStars();}
window.addEventListener('resize',resize);resize();
function horizY(){return H*0.68;}
function drawSky(){var hy=horizY(),g=ctx.createLinearGradient(0,0,0,hy);g.addColorStop(0,'#04000a');g.addColorStop(0.3,'#0c0018');g.addColorStop(0.6,'#160028');g.addColorStop(0.85,'#200038');g.addColorStop(1,'#140025');ctx.fillStyle=g;ctx.fillRect(0,0,W,hy);}
function drawStars(){for(var i=0;i<stars.length;i++){var s=stars[i],a=0.3+0.7*(0.5+0.5*Math.sin(s.phase+tick*s.speed*0.01));ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,'+a+')';ctx.fill();}}
function drawShooters(){for(var i=shooters.length-1;i>=0;i--){var sh=shooters[i],g=ctx.createLinearGradient(sh.x,sh.y,sh.x+sh.len,sh.y+sh.len*0.4);g.addColorStop(0,'rgba(255,255,255,0)');g.addColorStop(1,'rgba(255,255,255,'+sh.alpha+')');ctx.beginPath();ctx.moveTo(sh.x,sh.y);ctx.lineTo(sh.x+sh.len,sh.y+sh.len*0.4);ctx.strokeStyle=g;ctx.lineWidth=1.5;ctx.stroke();sh.x+=sh.speed*2;sh.y+=sh.speed*0.8;sh.alpha-=0.025;if(sh.alpha<=0)shooters.splice(i,1);}}
function drawSun(){var cx=W/2,hy=horizY(),sunR=H*0.16,sunCY=H*0.42,lbl=document.getElementById('sunLabel');if(lbl)lbl.style.top=(sunCY-sunR-16)+'px';var gp=0.8+0.2*Math.sin(tick*0.02),gl=ctx.createRadialGradient(cx,sunCY,sunR*0.5,cx,sunCY,sunR*3.5);gl.addColorStop(0,'rgba(255,45,120,'+(0.5*gp)+')');gl.addColorStop(0.3,'rgba(180,0,255,'+(0.3*gp)+')');gl.addColorStop(0.7,'rgba(180,0,255,0.05)');gl.addColorStop(1,'rgba(180,0,255,0)');ctx.fillStyle=gl;ctx.beginPath();ctx.arc(cx,sunCY,sunR*3.5,0,Math.PI*2);ctx.fill();ctx.save();ctx.beginPath();ctx.arc(cx,sunCY,sunR,0,Math.PI*2);ctx.clip();var sg=ctx.createLinearGradient(cx,sunCY-sunR,cx,sunCY+sunR);sg.addColorStop(0,'#fff9c0');sg.addColorStop(0.12,'#ffe600');sg.addColorStop(0.32,'#ff8c00');sg.addColorStop(0.58,'#ff2d78');sg.addColorStop(0.80,'#cc00dd');sg.addColorStop(1,'#7700bb');ctx.fillStyle=sg;ctx.fillRect(cx-sunR,sunCY-sunR,sunR*2,sunR*2);ctx.fillStyle='#07000d';var pos=sunCY+sunR*0.05,lt=sunR/18,gaps=[1.8,2.5,1.2,2.8,1.0,2.2,1.4,2.0,0.8,1.8,1.2,1.6,0.8,1.5,0.9,1.4,0.7,1.3,0.7,1.2,0.6,1.1];for(var li=0;li<gaps.length;li++){pos+=gaps[li]*lt;if(pos>sunCY+sunR)break;ctx.fillRect(cx-sunR,pos,sunR*2,lt*0.6);pos+=lt*0.6;}ctx.restore();}
function drawSunReflection(){var cx=W/2,hy=horizY(),g=ctx.createLinearGradient(cx,hy,cx,H);g.addColorStop(0,'rgba(255,45,120,0.35)');g.addColorStop(0.4,'rgba(255,45,120,0.12)');g.addColorStop(1,'rgba(255,45,120,0)');var rw=4+6*(0.5+0.5*Math.sin(tick*0.03));ctx.fillStyle=g;ctx.fillRect(cx-rw/2,hy,rw,H-hy);}
function drawMountains(){var hy=horizY();ctx.beginPath();ctx.moveTo(0,H);ctx.lineTo(0,hy*0.88);var bp=[0.03,0.82,0.07,0.92,0.11,0.74,0.15,0.88,0.20,0.66,0.25,0.85,0.29,0.72,0.34,0.88,0.39,0.62,0.44,0.82,0.48,0.70,0.53,0.90,0.57,0.65,0.62,0.84,0.66,0.72,0.71,0.90,0.76,0.62,0.81,0.85,0.85,0.70,0.89,0.88,0.93,0.65,0.97,0.85,1.0,0.75];for(var i=0;i<bp.length;i+=2)ctx.lineTo(bp[i]*W,bp[i+1]*hy);ctx.lineTo(W,H);ctx.closePath();ctx.fillStyle='#0e001e';ctx.fill();ctx.beginPath();ctx.moveTo(0,hy*0.88);for(var j=0;j<bp.length;j+=2)ctx.lineTo(bp[j]*W,bp[j+1]*hy);ctx.strokeStyle='rgba(180,0,255,0.8)';ctx.lineWidth=1.5;ctx.shadowColor='#b400ff';ctx.shadowBlur=10;ctx.stroke();ctx.shadowBlur=0;ctx.beginPath();ctx.moveTo(0,H);ctx.lineTo(0,hy*0.96);var fp=[0.04,0.86,0.08,0.95,0.13,0.75,0.18,0.90,0.23,0.68,0.28,0.88,0.33,0.75,0.38,0.92,0.43,0.65,0.48,0.85,0.52,0.95,0.57,0.72,0.62,0.90,0.67,0.78,0.72,0.92,0.77,0.65,0.82,0.88,0.87,0.75,0.91,0.90,0.95,0.78,1.0,0.88];for(var k=0;k<fp.length;k+=2)ctx.lineTo(fp[k]*W,fp[k+1]*hy);ctx.lineTo(W,H);ctx.closePath();ctx.fillStyle='#09000f';ctx.fill();ctx.beginPath();ctx.moveTo(0,hy*0.96);for(var m=0;m<fp.length;m+=2)ctx.lineTo(fp[m]*W,fp[m+1]*hy);ctx.strokeStyle='rgba(255,45,120,0.9)';ctx.lineWidth=2;ctx.shadowColor='#ff2d78';ctx.shadowBlur=12;ctx.stroke();ctx.shadowBlur=0;}
function drawTrees(){var hy=horizY();function drawTree(x,scale,flip){ctx.save();ctx.translate(x,hy);if(flip)ctx.scale(-1,1);ctx.scale(scale,scale);ctx.strokeStyle='rgba(180,0,255,0.55)';ctx.lineWidth=2.5/scale;ctx.shadowColor='#b400ff';ctx.shadowBlur=8;ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(0,-90);ctx.stroke();var br=[[-10,-30,-55,-65,1.0],[-10,-30,-75,-80,0.7],[8,-45,50,-72,0.9],[-5,-55,-40,-85,0.8],[5,-65,35,-90,0.7],[-3,-72,-28,-92,0.6],[3,-80,20,-95,0.5]];for(var bi=0;bi<br.length;bi++){var b=br[bi];ctx.globalAlpha=b[4];ctx.beginPath();ctx.moveTo(b[0],b[1]);ctx.lineTo(b[2],b[3]);ctx.stroke();}ctx.globalAlpha=1;ctx.shadowBlur=0;ctx.restore();}drawTree(W*0.05,1.1,false);drawTree(W*0.11,0.8,false);drawTree(W*0.15,1.3,true);drawTree(W*0.88,1.0,true);drawTree(W*0.93,1.2,false);}

function steamToSteam64(sid){
  sid=(sid||'').trim();
  if(/^\d{17}$/.test(sid))return sid;
  var m=sid.match(/^STEAM_\d+:(\d):(\d+)$/i);
  if(m){try{return String(BigInt('76561197960265728')+BigInt(parseInt(m[2]))*BigInt(2)+BigInt(parseInt(m[1])));}catch(e){return String(76561197960265728+parseInt(m[2])*2+parseInt(m[1]));}}
  return null;
}

// Mehrere Methoden & Proxies – versetzt gestartet damit kein Rate-Limit greift
function fetchSteamProfile(steam64,callback){
  var xmlTarget  = 'https://steamcommunity.com/profiles/'+steam64+'/?xml=1';
  var htmlTarget = 'https://steamcommunity.com/profiles/'+steam64+'/';
  var attempts=[
    {url:'https://corsproxy.io/?'+encodeURIComponent(xmlTarget),                   type:'xml'},
    {url:'https://api.allorigins.win/raw?url='+encodeURIComponent(xmlTarget),      type:'xml'},
    {url:'https://corsproxy.io/?'+encodeURIComponent(htmlTarget),                  type:'html'},
    {url:'https://api.allorigins.win/raw?url='+encodeURIComponent(htmlTarget),     type:'html'},
    {url:'https://api.codetabs.com/v1/proxy?quest='+encodeURIComponent(xmlTarget), type:'xml'},
    {url:'https://thingproxy.freeboard.io/fetch/'+xmlTarget,                       type:'xml'}
  ];
  var done=false,failed=0,total=attempts.length;
  function parseXml(text){
    if(!text||text.indexOf('<steamID')===-1)return null;
    var nm=text.match(/<steamID><!\[CDATA\[([^\]]+)\]\]><\/steamID>/i);
    var av=text.match(/<avatarMedium><!\[CDATA\[([^\]]+)\]\]><\/avatarMedium>/i);
    return nm?{name:nm[1],avatar:av?av[1]:null}:null;
  }
  function parseHtml(text){
    if(!text)return null;
    var nm=text.match(/property=["']og:title["'][^>]*content=["']([^"'<>]+)["']/i)
           ||text.match(/content=["']([^"'<>]+)["'][^>]*property=["']og:title["']/i);
    var av=text.match(/property=["']og:image["'][^>]*content=["']([^"'<>]+)["']/i)
           ||text.match(/content=["']([^"'<>]+)["'][^>]*property=["']og:image["']/i);
    if(!nm||!nm[1]||nm[1]==='Steam'||nm[1].length<1)return null;
    var cleanName=nm[1].replace(/^Steam Community\s*::\s*/i,'').trim();
    if(!cleanName||cleanName==='Steam')return null;
    return{name:cleanName,avatar:av?av[1].replace('_full','_medium'):null};
  }
  function fire(idx){
    var a=attempts[idx];
    var xhr=new XMLHttpRequest();xhr.open('GET',a.url,true);xhr.timeout=10000;
    xhr.onreadystatechange=function(){
      if(xhr.readyState!==4||done)return;
      if(xhr.status===200&&xhr.responseText){
        var r=a.type==='xml'?parseXml(xhr.responseText):parseHtml(xhr.responseText);
        if(r){done=true;callback(r.name,r.avatar);return;}
      }
      failed++;if(failed===total)callback(null,null);
    };
    xhr.onerror=xhr.ontimeout=function(){if(done)return;failed++;if(failed===total)callback(null,null);};
    xhr.send();
  }
  // Erste 2 sofort, Rest versetzt (400ms) damit Proxies nicht rate-limiten
  fire(0);fire(1);
  for(var i=2;i<attempts.length;i++){
    (function(idx){setTimeout(function(){if(!done)fire(idx);},400*(idx-1));})(i);
  }
}

function renderTeam(){
  var list=document.getElementById('teamList');list.innerHTML='';
  if(!TEAM_DATA.length){list.innerHTML='<div class="p-empty">&gt; Kein Team eingetragen<br>&gt; _</div>';return;}
  TEAM_DATA.forEach(function(m){
    var s64=steamToSteam64(m.steamid)||m.steamid;
    var cached=teamCache[s64]||{};
    var name=cached.name||m.name||null;
    var avatar=cached.avatar||m.avatar||null;
    var col=m.color||'#b400ff';
    // Fallback: letzte 6 Zeichen der Steam64-ID anzeigen statt '...'
    var display=name||(s64.length>6?'…'+s64.slice(-6):s64);

    var row=document.createElement('div');row.className='tm-row';
    var ad=document.createElement('div');ad.className='tm-avatar';ad.style.borderColor=col;

    if(avatar){
      var img=new Image();img.src=avatar;
      img.onerror=function(){ad.innerHTML='<span class="tm-avatar-init" style="color:'+col+'">'+(display[0]||'?').toUpperCase()+'</span>';};
      ad.appendChild(img);
    }else{
      ad.innerHTML='<span class="tm-avatar-init" style="color:'+col+'">'+(display[0]||'?').toUpperCase()+'</span>';
    }

    var info=document.createElement('div');info.className='tm-info';
    info.innerHTML='<div class="tm-name">'+escHtml(display)+'</div><span class="tm-rank" style="color:'+col+';background:'+rankBg(col)+';border:1px solid '+col+'88;">'+escHtml(m.rank||'Member')+'</span>';
    row.appendChild(ad);row.appendChild(info);list.appendChild(row);
  });
}

var _retryTimer=null;
function loadAllProfiles(){
  clearTimeout(_retryTimer);
  renderTeam(); // sofort aus Cache zeigen (0 ms)
  TEAM_DATA.forEach(function(m){

    fetchSteamProfile(s64,function(name,avatar){
      if(name){
        teamCache[s64]={name:name,avatar:avatar,ts:Date.now()};

        _retryTimer=setTimeout(loadAllProfiles,15000); // alle Proxies gescheitert → retry

  });
}
